<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otokojuku: Legends Duel</title>
    <style>
        :root {
            --primary: #c92a2a;
            --bg-dark: #1a1a1a;
            --ui-bg: rgba(10, 10, 15, 0.9);
            --text-main: #f1f3f5;
            --accent: #ffeb3b;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            box-shadow: 0 0 20px rgba(201, 42, 42, 0.3);
            background: linear-gradient(to bottom, #1c2331 0%, #0b0f19 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        .hidden { display: none !important; }
        
        h1 {
            color: var(--primary);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #000;
        }
        h2 { margin-bottom: 20px; font-weight: 300; }
        
        /* Layout for Menu + Hero Info */
        .menu-content {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .selection-container {
            display: flex;
            gap: 20px;
        }
        .player-select {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
            width: 280px;
        }
        .player-select h3 { margin-top: 0; text-align: center; color: var(--accent); }
        
        .hero-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            border-radius: 4px;
        }
        .hero-btn:hover { background: #444; }
        .hero-btn.selected {
            background: linear-gradient(90deg, var(--primary) 0%, #8e0000 100%);
            border-color: #ff5252;
            font-weight: bold;
        }
        
        /* Info Panel */
        .hero-info-panel {
            background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(0,0,0,0.8));
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            width: 350px;
            height: 400px;
            box-shadow: 0 0 15px rgba(229,57,53,0.2);
            color: #ddd;
            overflow-y: auto;
        }
        .hero-info-panel h3 { color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 0;}
        .info-stat { font-weight: bold; color: #fff; }
        .info-desc { font-size: 0.9rem; line-height: 1.4; margin-bottom: 15px; color: #bbb;}
        .skill-tag { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 3px; font-size: 0.8rem; color: #0ff;}

        .controls-info {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
        .controls-info span { color: #fff; font-weight: bold; }

        .btn-row {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }
        .btn-start, .btn-settings {
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
        }
        .btn-start { background: var(--primary); }
        .btn-settings { background: #555; }
        .btn-start:hover, .btn-settings:hover { filter: brightness(1.2); transform: scale(1.05); }
        .btn-start:active, .btn-settings:active { transform: scale(0.95); }

        /* Settings Modal */
        #settings-screen {
            background: rgba(0,0,0,0.95);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 800px;
        }
        .keybind-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }
        .key-btn {
            background: #222; border: 1px solid #555; color: #fff; padding: 5px 15px; border-radius: 3px; cursor: pointer; min-width: 100px; text-align: center;
        }
        .key-btn.listening { background: var(--primary); animation: pulse 1s infinite; }

        /* In-Game UI Overlay */
        #game-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;
        }
        .hud-player {
            position: absolute; top: 20px; width: 350px; background: rgba(0,0,0,0.6);
            padding: 10px; border-radius: 5px; border: 1px solid #444;
        }
        #hud-p1 { left: 20px; border-left: 3px solid var(--primary); }
        #hud-p2 { right: 20px; text-align: right; border-right: 3px solid #2196f3; }
        
        .hud-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; text-transform: uppercase; }
        .bar-container { width: 100%; height: 20px; background: #333; margin-bottom: 5px; border-radius: 3px; overflow: hidden; border: 1px solid #111; }
        .health-bar { height: 100%; background: #4caf50; transition: width 0.1s; }
        .horse-bar { height: 100%; background: #8B4513; transition: width 0.1s; }
        .super-bar { height: 100%; background: #2196f3; transition: width 0.1s; }
        .super-bar.ready { background: #ffeb3b; animation: pulse 0.8s infinite alternate; }
        
        @keyframes pulse { from { opacity: 0.8; filter: brightness(1); } to { opacity: 1; filter: brightness(1.5); box-shadow: 0 0 10px #ffeb3b; } }
        
        .status-text { font-size: 0.85rem; color: #ffd54f; min-height: 16px; font-weight: bold; }
        .prompt-text { position: absolute; color: #fff; font-weight: bold; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; font-size: 14px; text-align: center; width: 200px; transform: translateX(-50%); z-index: 6;}

        #game-over { text-align: center; }
        #winner-text { font-size: 4rem; color: #ffeb3b; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,235,59,0.5); font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Game UI Overlay -->
    <div id="game-ui" class="hidden">
        <div id="hud-p1" class="hud-player">
            <div class="hud-name" id="p1-name">P1 Name</div>
            <div class="bar-container"><div id="p1-hp" class="health-bar" style="width: 100%"></div></div>
            <div class="bar-container hidden" id="p1-horse-container"><div id="p1-horse-hp" class="horse-bar" style="width: 100%"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p1-super" class="super-bar" style="width: 0%"></div></div>
            <div class="status-text" id="p1-status"></div>
        </div>
        <div id="hud-p2" class="hud-player">
            <div class="hud-name" id="p2-name">P2 Name</div>
            <div class="bar-container"><div id="p2-hp" class="health-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container hidden" id="p2-horse-container"><div id="p2-horse-hp" class="horse-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p2-super" class="super-bar" style="width: 0%; float: right;"></div></div>
            <div class="status-text" id="p2-status"></div>
        </div>
        <div id="dynamic-prompts"></div>
    </div>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen">
        <h1>Otokojuku: Legends Duel</h1>
        <h2>Select Your Heroes</h2>
        
        <div class="menu-content">
            <div class="selection-container">
                <!-- P1 Select -->
                <div class="player-select">
                    <h3>Player 1</h3>
                    <div id="p1-roster"></div>
                    <div class="controls-info" id="p1-controls-display"></div>
                </div>
                
                <!-- P2 Select -->
                <div class="player-select">
                    <h3>Player 2</h3>
                    <div id="p2-roster"></div>
                    <div class="controls-info" id="p2-controls-display"></div>
                </div>
            </div>

            <!-- Interactive Hero Info Panel -->
            <div class="hero-info-panel" id="hero-info-panel">
                <h3 id="info-name">Hover a Hero</h3>
                <div class="info-desc" id="info-desc">Select a hero to see their abilities.</div>
                <div id="info-details"></div>
            </div>
        </div>
        
        <div class="btn-row">
            <button class="btn-start" id="btn-sp">1 Player (Vs CPU)</button>
            <button class="btn-start" id="btn-mp">2 Players (Local)</button>
            <button class="btn-settings" id="btn-open-settings">⚙ Settings</button>
        </div>
    </div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="screen hidden">
        <h1 style="color: white;">Key Bindings</h1>
        <div class="settings-grid">
            <div class="player-select">
                <h3 style="color: var(--primary);">Player 1</h3>
                <div id="p1-bindings"></div>
            </div>
            <div class="player-select">
                <h3 style="color: #2196f3;">Player 2</h3>
                <div id="p2-bindings"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-settings" id="btn-reset-bindings">Reset Default</button>
            <button class="btn-start" id="btn-close-settings">Save & Close</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <div id="winner-text">Player 1 Wins!</div>
        <button class="btn-start" id="btn-restart" style="font-size: 1.2rem; padding: 10px 30px; margin-top: 10px;">Main Menu</button>
    </div>
</div>

<script>
/**
 * Otokojuku: Legends Duel
 * A 2D Canvas Platform Fighter
 */

// --- Input & KeyBinding Manager ---
const DEFAULT_BINDS = {
    p1: { left: 'KeyA', right: 'KeyD', jump: 'KeyW', down: 'KeyS', attack: 'Space', super: 'KeyE', switch: 'KeyT' },
    p2: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', down: 'ArrowDown', attack: 'Numpad9', super: 'NumpadEnter', switch: 'Numpad8' }
};

let currentBinds = JSON.parse(localStorage.getItem('otokojuku_binds')) || JSON.parse(JSON.stringify(DEFAULT_BINDS));

function saveBinds() {
    localStorage.setItem('otokojuku_binds', JSON.stringify(currentBinds));
    updateControlsDisplay();
}

let listeningKey = null;

window.addEventListener('keydown', e => {
    if (listeningKey) {
        e.preventDefault();
        currentBinds[listeningKey.player][listeningKey.action] = e.code;
        listeningKey.btn.innerText = formatKey(e.code);
        listeningKey.btn.classList.remove('listening');
        listeningKey = null;
        saveBinds();
    } else {
        keys[e.code] = true;
        if (!e.repeat) keysPressed[e.code] = true;
    }
});
window.addEventListener('keyup', e => {
    if (!listeningKey) keys[e.code] = false;
});

function formatKey(code) {
    if (!code) return 'UNBOUND';
    return code.replace('Key', '').replace('Arrow', '').replace('Numpad', 'Num ');
}

function updateControlsDisplay() {
    document.getElementById('p1-controls-display').innerHTML = `
        Move: <span>${formatKey(currentBinds.p1.left)}, ${formatKey(currentBinds.p1.down)}, ${formatKey(currentBinds.p1.right)}</span><br>
        Jump: <span>${formatKey(currentBinds.p1.jump)}</span><br>
        Attack: <span>${formatKey(currentBinds.p1.attack)}</span><br>
        Super: <span>${formatKey(currentBinds.p1.super)}</span><br>
        Switch/Misc: <span>${formatKey(currentBinds.p1.switch)}</span>
    `;
    document.getElementById('p2-controls-display').innerHTML = `
        Move: <span>${formatKey(currentBinds.p2.left)}, ${formatKey(currentBinds.p2.down)}, ${formatKey(currentBinds.p2.right)}</span><br>
        Jump: <span>${formatKey(currentBinds.p2.jump)}</span><br>
        Attack: <span>${formatKey(currentBinds.p2.attack)}</span><br>
        Super: <span>${formatKey(currentBinds.p2.super)}</span><br>
        Switch/Misc: <span>${formatKey(currentBinds.p2.switch)}</span>
    `;
}

function buildSettingsUI() {
    ['p1', 'p2'].forEach(p => {
        const container = document.getElementById(`${p}-bindings`);
        container.innerHTML = '';
        Object.keys(currentBinds[p]).forEach(action => {
            let row = document.createElement('div');
            row.className = 'keybind-row';
            row.innerHTML = `<span style="text-transform:capitalize">${action}:</span>`;
            let btn = document.createElement('button');
            btn.className = 'key-btn';
            btn.innerText = formatKey(currentBinds[p][action]);
            btn.onclick = () => {
                if (listeningKey) listeningKey.btn.classList.remove('listening');
                listeningKey = { player: p, action: action, btn: btn };
                btn.classList.add('listening');
                btn.innerText = 'Press Any Key...';
            };
            row.appendChild(btn);
            container.appendChild(row);
        });
    });
}

const GRAVITY = 0.6;
let GROUND_Y = CANVAS_H - 100;

    { x: Math.max(50, CANVAS_W / 4 - 150), y: GROUND_Y - 350, w: 250, h: 20, type: 'side' },

};

const keys = {};
const keysPressed = {};

function checkAABB(r1, r2) {
    return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
}

// --- Game Engine Classes ---
class Entity {
    constructor(x, y, w, h) { 
        this.x = x; this.y = y; this.w = w; this.h = h; 
        this.vx = 0; this.vy = 0; this.dead = false; 
        this.untargetable = false; 
    }
    update(dt) {} draw(ctx) {}
    takeDamage(amt, attacker, isDoT = false, noKnockback = false) {}
}

class Particle extends Entity {
    constructor(x, y, color, vx, vy, life, size=4) {
        super(x, y, size, size);
        this.color = color; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.untargetable = true;
    }
    update(dt) {
        this.x += this.vx; this.y += this.vy; this.vy += GRAVITY * 0.5;
        this.life -= dt; if (this.life <= 0) this.dead = true;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.globalAlpha = 1.0;
    }
}

class SwordShadow extends Entity {

}

class SwordArray extends Entity {
    constructor(owner, x, y, facing) {
        super(x, y, 300, 100);
        this.owner = owner;
        this.facing = facing;
        if (facing === -1) this.x -= this.w; 
        this.life = 3000;
        this.tickTimer = 0;
        this.type = "sword_array";
        this.untargetable = true;
    }
    update(dt) {
        this.life -= dt;
        if (this.life <= 0) this.dead = true;
        
        this.tickTimer += dt;
        if (this.tickTimer >= 500) {
            this.tickTimer = 0;
            // Safe filter: ignore dead, invincible, untargetable, the owner, and owner's minions
            let targets = [game.p1, game.p2, ...game.minions].filter(t => !t.untargetable && t !== this.owner && t.owner !== this.owner && !t.dead && !(t.invincible > 0));
            for (let t of targets) {
                if (checkAABB(this, t)) {
                    t.takeDamage(100, this.owner, true); // 1 WRD
                    if (t.buffs) t.buffs.slow = Math.max(t.buffs.slow || 0, 1200); // 40% slow applied continuously
                }
            }
        }
        
        if (Math.random() < 0.5) {
            let px = this.x + Math.random() * this.w;
            game.particles.push(new Particle(px, this.y + this.h, "#fff", 0, -10 - Math.random()*10, 300, 3));
        }
    }
    draw(ctx) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.w, this.h);
        
        for(let i=0; i<this.w; i+=30) {
            let hOffset = Math.sin((Date.now() + i*100) * 0.01) * 20 + 40;
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.beginPath();
            ctx.moveTo(this.x + i, this.y + this.h);
            ctx.lineTo(this.x + i + 10, this.y + this.h - hOffset);
            ctx.lineTo(this.x + i + 20, this.y + this.h);
            ctx.fill();
        }
    }
}

class Hazard extends Entity {
    constructor(x, y, w, h, delay, duration, damage, owner, color, ccDuration = 0) {
        super(x, y, w, h);
        this.delay = delay; 
        this.duration = duration; 
        this.damage = damage;
        this.owner = owner; 
        this.color = color; 
        this.ccDuration = ccDuration;
        this.hitTargets = new Set();
        this.untargetable = true;
    }
    update(dt) {
        if (this.delay > 0) { 
            this.delay -= dt; 
            return; 
        }
        this.duration -= dt;
        if (this.duration <= 0) { 
            this.dead = true; 
            return; 
        }
        let targets = [game.p1, game.p2, ...game.minions].filter(t => !t.untargetable && t !== this.owner && t.owner !== this.owner && !t.dead && !(t.invincible > 0));
        for (let t of targets) {
            if (checkAABB(this, t) && !this.hitTargets.has(t)) {
                t.takeDamage(this.damage, this.owner);
                if (this.ccDuration > 0 && t.buffs) {
                    t.buffs.dizzy = Math.max(t.buffs.dizzy || 0, this.ccDuration);
                }
                this.hitTargets.add(t);
            }
        }
    }
    draw(ctx) {
        if (this.delay > 0) {
            ctx.fillStyle = "rgba(255,0,0,0.3)";
            ctx.fillRect(this.x, this.y + this.h - 5, this.w, 5);
        } else {
            ctx.fillStyle = this.color;
            for(let i=0; i<this.w; i+=15) {
                ctx.beginPath(); 
                ctx.moveTo(this.x+i, this.y+this.h); 
                ctx.lineTo(this.x+i+7.5, this.y); 
                ctx.lineTo(this.x+i+15, this.y+this.h); 
                ctx.fill();
            }
        }
    }
}

class FireDragon extends Entity {
    constructor(owner, x, y) {

        this.hp = 50; 
        this.maxHp = 50;
        this.color = "#ff4500";

        if (!enemy.dead) {
            let dx = (enemy.x+enemy.w/2) - (this.x+this.w/2);
            let dy = (enemy.y+enemy.h/2) - (this.y+this.h/2);
            let angle = Math.atan2(dy, dx);
            this.vx = Math.cos(angle) * this.speed;
            this.vy = Math.sin(angle) * this.speed;
            this.x += this.vx; this.y += this.vy;
            game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ff4500", -this.vx*0.5, -this.vy*0.5, 200, 5));
            
            if (Math.hypot(dx, dy) < 40) {

                game.createExplosion(this.x+this.w/2, this.y+this.h/2, 80, 100, this.owner, false, 0); 
            }
        }

    draw(ctx) {

        ctx.fillStyle = "#fff"; ctx.fillRect(this.x+this.w/2 + (this.vx>0?5:-15), this.y+this.h/2-5, 10, 10);

}

class Projectile extends Entity {
    constructor(x, y, w, h, vx, vy, damage, owner, color, type="normal") {
        super(x, y, w, h);
        this.vx = vx; this.vy = vy; this.damage = damage; this.owner = owner;
        this.color = color; this.type = type; this.timer = 0;
        this.hitTargets = new Set();
    }
    update(dt) {
        this.x += this.vx; this.y += this.vy;
        
        if (this.type === "dynamite") {
            this.vy += GRAVITY;
            if (this.y + this.h >= GROUND_Y) { this.y = GROUND_Y - this.h; this.vx *= 0.8; this.vy = 0; }
            this.timer += dt;
            if (this.timer >= 1500) {
                this.dead = true;
                game.createExplosion(this.x + this.w/2, this.y + this.h/2, 120, 153, this.owner); 
            }
        } else if (this.type === "homing_bullet" || this.type === "magic_burst" || this.type === "volt_laser") {
            let target = game.getEnemyOf(this.owner);
            let minDist = Math.hypot(target.x - this.x, target.y - this.y);
            for (let m of game.minions) {
                if (m.owner !== this.owner && !m.dead && !m.untargetable) {
                    let d = Math.hypot(m.x - this.x, m.y - this.y);
                    if (d < minDist) { minDist = d; target = m; }
                }
            }
            if (!target.dead && !(target.invincible > 0)) {
                if (this.type !== "volt_laser" || this.timer < 1500) {
                    let tx = target.x + target.w/2; let ty = target.y + target.h/2;
                    let angle = Math.atan2(ty - (this.y + this.h/2), tx - (this.x + this.w/2));
                    let speed = this.type === "magic_burst" ? 18 : (this.type === "volt_laser" ? 15 : 25); 
                    let turnSpeed = this.type === "magic_burst" ? 0.08 : (this.type === "volt_laser" ? 0.05 : 0.15);
                    this.vx += (Math.cos(angle) * speed - this.vx) * turnSpeed;
                    this.vy += (Math.sin(angle) * speed - this.vy) * turnSpeed;
                }
            }
            this.timer += dt;
        } else if (this.type === "knife" || this.type === "large_knife" || this.type === "enhanced_knife" || this.type === "ki_blast" || this.type === "thrown_axe") {
            if (this.type !== "ki_blast" && this.type !== "thrown_axe") this.vy += GRAVITY * 0.1;
        }

        if (this.x < -100 || this.x > CANVAS_W + 100 || this.y > CANVAS_H || this.y < -100) this.dead = true;

        if (!this.dead && game.hurricane && !game.hurricane.dead && this.owner !== game.hurricane.owner) {
            if (checkAABB(this, game.hurricane)) {
                this.dead = true;
                for(let i=0; i<5; i++) game.particles.push(new Particle(this.x, this.y, "#aaddff", (Math.random()-0.5)*8, (Math.random()-0.5)*8, 200));
                return; 
            }
        }

        if (!this.dead && this.type !== "dynamite") {
            let targets = [game.getEnemyOf(this.owner), ...game.minions.filter(m => m.owner !== this.owner)];
            for (let t of targets) {
                if (t.untargetable) continue;
                
                if (!t.dead && !(t.invincible > 0) && checkAABB(this, t) && !this.hitTargets.has(t)) {
                    let isBlocked = false;
                    if (t.attackState === 'active' && t.isMeleeAttack() && (t.heroName === 'Artu' || (t.heroName === 'Duke' && !t.isMounted))) {
                        if (Math.random() < 0.5) isBlocked = true;
                    }

                    if (isBlocked) {
                        for(let i=0; i<15; i++) game.particles.push(new Particle(this.x, this.y, "#ffffff", (Math.random()-0.5)*20, (Math.random()-0.5)*20, 300, 6));
                        for(let i=0; i<10; i++) game.particles.push(new Particle(this.x, this.y, "#ffd700", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 400, 4));
                    } else {
                        let noKnockback = (this.type === "bullet" || this.type === "ki_blast" || this.type === "magic_burst" || this.type === "paper_plane" || this.type === "blue_paper_plane" || this.type === "fire_bolt" || this.type === "water_bolt" || this.type === "tidal_wave" || this.type === "volt_laser"); 
                        t.takeDamage(this.damage, this.owner, false, noKnockback);
                        
                        if (t.buffs) {
                            if (this.type === "large_knife" || this.type === "enhanced_knife") t.buffs.slow = 5000;
                            if (this.type === "enhanced_knife") {
                                let dir = this.vx > 0 ? 1 : -1;
                                t.vx = dir * 30; 
                                t.vy = -5;
                            }
                            if (this.type === "ki_blast") {
                                t.buffs.dizzy = 750; 
                                let dir = this.vx > 0 ? 1 : -1;
                                t.vx = dir * 45; 
                                t.vy = -8;
                            }
                            if (this.type === "fire_bolt") {
                                t.buffs.burn = 3000;
                                t.buffs.slow = 1000;
                            }
                            if (this.type === "water_bolt") {
                                if (t.waterStunImmunity <= 0) {
                                    t.buffs.dizzy = 500;
                                    t.waterStunImmunity = 1000;
                                }
                            }
                            if (this.type === "tidal_wave") {
                                t.buffs.slow = 4500;
                                t.buffs.dizzy = 1000;
                                t.vx += (this.vx > 0 ? 1 : -1) * 15; 
                            }
                        }

                        if (this.type === "bullet" && this.owner.heroName === 'Duke') {
                            this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 50); 
                            for(let i=0; i<8; i++) game.particles.push(new Particle(this.owner.x + Math.random()*this.owner.w, this.owner.y + Math.random()*this.owner.h, "#32CD32", 0, -Math.random()*4, 500, 5));
                        }
                        for(let i=0; i<5; i++) game.particles.push(new Particle(this.x, this.y, this.color, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 300));
                    }
                    
                    this.hitTargets.add(t);
                    if (this.type !== "blue_paper_plane" && this.type !== "tidal_wave") {
                        this.dead = true;
                        break;
                    }
                }
            }
        }
    }
    draw(ctx) {
        ctx.fillStyle = this.color;
        if (this.type === "dynamite") {
            ctx.fillStyle = "#ff3333"; ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = "#ffff00"; ctx.fillRect(this.x + this.w/2, this.y - 5, 2, 5);
        } else if (this.type === "knife" || this.type === "large_knife" || this.type === "enhanced_knife") {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(this.vx > 0 ? this.timer*0.02 : -this.timer*0.02);
            if (this.type === "large_knife") { ctx.scale(2, 2); ctx.fillStyle = "#0ff"; } 
            else if (this.type === "enhanced_knife") { ctx.scale(1.5, 1.5); ctx.fillStyle = "#ff5500"; }
            else ctx.fillStyle = "#ddd";
            ctx.beginPath(); ctx.moveTo(-10, -2); ctx.lineTo(10, 0); ctx.lineTo(-10, 2); ctx.fill();
            ctx.restore(); this.timer += 16;
            
            if (this.type === "enhanced_knife") game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, "#ff5500", 0, 0, 150, 4));
        } else if (this.type === "ki_blast") {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.fillStyle = "rgba(0, 191, 255, 0.8)";
            ctx.beginPath(); ctx.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.ellipse(0, 0, this.w/4, this.h/4, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, "#00bfff", 0, 0, 150, 6));
        } else if (this.type === "magic_burst") {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(this.timer * 0.05);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.rotate(Math.PI/4);
            ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.restore();
            game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, this.color, 0, 0, 150, 4));
            this.timer += 16;
        } else if (this.type === "thrown_axe") {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(this.timer * 0.05 * (this.vx > 0 ? 1 : -1));
            ctx.fillStyle = "#8B4513"; ctx.fillRect(-3, -15, 6, 30); 
            ctx.fillStyle = "#ccc";
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(15, -20); ctx.lineTo(20, 0); ctx.lineTo(0, 5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-15, -20); ctx.lineTo(-20, 0); ctx.lineTo(0, 5); ctx.fill(); 
            ctx.restore();
            this.timer += 16;
        } else if (this.type === "paper_plane" || this.type === "blue_paper_plane") {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
            let pAngle = Math.atan2(this.vy, this.vx);
            ctx.rotate(pAngle);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(this.w/2, 0); 
            ctx.lineTo(-this.w/2, this.h/2); 
            ctx.lineTo(-this.w/4, 0); 
            ctx.lineTo(-this.w/2, -this.h/2); 
            ctx.fill();
            ctx.restore();
            if (this.type === "blue_paper_plane" && Math.random() < 0.5) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#88ccff", 0, 0, 150, 3));
        } else if (this.type === "fire_bolt" || this.type === "water_bolt") {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x+this.w/2, this.y+this.h/2, this.w/2, 0, Math.PI*2); ctx.fill();
            game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, this.color, 0, 0, 100, 3));
        } else if (this.type === "volt_laser") {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00FFFF";
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.shadowBlur = 0;
            game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#00FFFF", 0, 0, 100, 2));
        } else if (this.type === "tidal_wave") {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.w, this.h);
            game.particles.push(new Particle(this.x+Math.random()*this.w, this.y+Math.random()*this.h, "#fff", 0, -2, 100, 2));
        } else if (this.type === "bullet" || this.type === "homing_bullet") {
            ctx.fillStyle = this.type === "homing_bullet" ? "#ff5500" : "#fff"; 
            ctx.fillRect(this.x, this.y, this.w, this.h);
        } else {
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
    }
}

class Minion extends Entity {
    constructor(owner, x, y) {
        super(x, y, 35, 65);
        this.owner = owner; this.type = "minion"; this.hp = 30; this.maxHp = this.hp;
        this.shootTimer = Math.random() * 1000; this.color = "#f4f4f4";
        this.buffs = { dizzy: 0 }; this.invincible = 0;
    }
    takeDamage(amt, attacker) {
        if (this.grappledBy) return; 
        this.hp -= amt;
        if (this.hp <= 0) {
            this.dead = true;
            if (attacker && attacker.heroName === 'Euclid') {
                game.minions.push(new Skeleton(attacker, this.x, this.y));
                for(let i=0; i<15; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#8A2BE2", (Math.random()-0.5)*10, -Math.random()*10, 500, 6));
            } else {
                for(let i=0; i<10; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ff0000", (Math.random()-0.5)*10, Math.random()*-10, 500));
            }
        }
    }
    update(dt) {
        if (this.buffs.dizzy > 0) { this.buffs.dizzy -= dt; return; }

        this.vy += GRAVITY; this.y += this.vy;
        if (this.y + this.h >= GROUND_Y) { this.y = GROUND_Y - this.h; this.vy = 0; }
        if (this.vy > 0) {
            for (let plat of PLATFORMS) {
                if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y && this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                    this.y = plat.y - this.h; this.vy = 0;
                }
            }
        }

        let enemy = game.getEnemyOf(this.owner);
        if (enemy && !enemy.dead) {
            this.shootTimer += dt;
            if (this.shootTimer >= 1500) {
                this.shootTimer = 0;
                let cx = this.x + this.w/2; let cy = this.y + 25;
                let ex = enemy.x + enemy.w/2; let ey = enemy.y + enemy.h/2;
                let angle = Math.atan2(ey - cy, ex - cx);
                game.projectiles.push(new Projectile(cx, cy, 6, 6, Math.cos(angle)*12, Math.sin(angle)*12, 13, this.owner, "#FFFF00")); 
                game.particles.push(new Particle(cx + Math.cos(angle)*15, cy + Math.sin(angle)*15, "#FFA500", 0, 0, 100));
            }
        }
    }
    draw(ctx) {
        if (this.buffs.dizzy > 0) {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y - 15);
            let timeAngle = Date.now() * 0.005;
            for(let s=0; s<3; s++) {
                let offset = timeAngle + (s * (Math.PI*2/3));
                ctx.fillStyle = "#FFD700"; ctx.fillRect(Math.cos(offset)*15, Math.sin(offset)*4, 3, 3);
            }
            ctx.restore();
        }
        ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = "#333"; ctx.fillRect(this.x, this.y + 35, this.w, 6);
        let enemy = game.getEnemyOf(this.owner);
        let dir = (enemy && enemy.x < this.x) ? -1 : 1;
        ctx.fillStyle = "#111"; ctx.fillRect(this.x + (dir > 0 ? 22 : 8), this.y + 15, 5, 4);
        ctx.fillStyle = "#dcb274"; ctx.beginPath(); ctx.moveTo(this.x + this.w / 2, this.y - 12); ctx.lineTo(this.x - 12, this.y + 8); ctx.lineTo(this.x + this.w + 12, this.y + 8); ctx.fill();

class Skeleton extends Entity {

        this.maxHp = 100;

        this.speed = 7; 
        this.jumpPower = 20; 
        this.attackCooldown = 0;
        this.buffs = { dizzy: 0 };
        this.invincible = 0;
    }
    takeDamage(amt, attacker) {
        if (this.grappledBy) return;
        this.hp -= amt;
        if (this.hp <= 0) {
            this.dead = true;
            game.createExplosion(this.x + this.w/2, this.y + this.h/2, 60, 23, this.owner, false); 
            for(let i=0; i<15; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#aaa", (Math.random()-0.5)*10, Math.random()*-15, 500, 6));
        }
    }
    update(dt) {
        if (this.buffs.dizzy > 0) { this.buffs.dizzy -= dt; return; }

        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y + this.h >= GROUND_Y) { this.y = GROUND_Y - this.h; this.vy = 0; }
        
        if (this.vy >= 0) {
            for (let plat of PLATFORMS) {
                if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y && this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                    this.y = plat.y - this.h; this.vy = 0;
                }
            }
        }

        let enemy = game.getEnemyOf(this.owner);
        if (enemy && !enemy.dead) {
            let dx = enemy.x + enemy.w/2 - (this.x + this.w/2);
            let dy = enemy.y + enemy.h/2 - (this.y + this.h/2);
            let dist = Math.abs(dx);

            if (dist > 30) {
                this.vx = (dx > 0 ? 1 : -1) * this.speed;
                this.x += this.vx;
            }

            if (dy < -40 && this.vy === 0 && dist < 150) {
                this.vy = -this.jumpPower;
            }

            if (this.attackCooldown > 0) this.attackCooldown -= dt;
            if (dist < 50 && Math.abs(dy) < 60 && this.attackCooldown <= 0) {
                enemy.takeDamage(30, this.owner); 
                this.attackCooldown = 1000;
                game.particles.push(new Particle(this.x + this.w/2, this.y, "#8A2BE2", dx>0?5:-5, 0, 200, 8));
            }
        }
        
        if (this.x < 0) this.x = 0;
        if (this.x > CANVAS_W - this.w) this.x = CANVAS_W - this.w;
    }
    draw(ctx) {
        if (this.buffs.dizzy > 0) {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y - 15);
            let timeAngle = Date.now() * 0.005;
            for(let s=0; s<3; s++) {
                let offset = timeAngle + (s * (Math.PI*2/3));
                ctx.fillStyle = "#FFD700"; ctx.fillRect(Math.cos(offset)*10, Math.sin(offset)*3, 3, 3);
            }
            ctx.restore();
        }
        
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x + 5, this.y + 18, this.w - 10, this.h - 18); 
        ctx.fillStyle = "#111"; 
        ctx.fillRect(this.x + 5, this.y + 25, this.w - 10, 4);
        ctx.fillRect(this.x + 5, this.y + 35, this.w - 10, 4);
        ctx.fillRect(this.x + 5, this.y + 45, this.w - 10, 4);
        
        ctx.fillStyle = "#fff";
        ctx.fillRect(this.x + 2, this.y, this.w - 4, 18); 
        ctx.fillStyle = "#8A2BE2"; 
        let enemy = game.getEnemyOf(this.owner);
        let dir = (enemy && enemy.x > this.x) ? 1 : -1;
        ctx.fillRect(this.x + (dir>0?20:10), this.y + 4, 6, 6);
        
        ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 12, this.w, 4);
        ctx.fillStyle = "#8A2BE2"; ctx.fillRect(this.x, this.y - 12, this.w * (this.hp/this.maxHp), 4);
    }
}

class Puppet extends Entity {
    constructor(owner, x, y) {

        this.jumpPower = 15;
        this.attackCooldown = 0;
        this.buffs = { dizzy: 0 };
        this.invincible = 0;
        this.targetVx = 0;
        this.facing = owner.facing;
        this.attackState = 'idle';
        this.stateTimer = 0;
        this.hasHit = false;
        this.isGrounded = false;
    }
    takeDamage(amt, attacker) {
        if (this.grappledBy) return;
        this.hp -= amt;
        if (this.hp <= 0) {
            this.dead = true;
            for(let i=0; i<15; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#fff", (Math.random()-0.5)*10, Math.random()*-15, 500, 4));
            if (this.owner && !this.owner.dead) {
                this.owner.buffs.dizzy = 3000;
                this.owner.attackState = 'idle';
            }
        }
    }
    doJump() {
        if (this.isGrounded && this.attackState === 'idle') {
            this.vy = -this.jumpPower;
            this.isGrounded = false;
        }
    }
    doAttack() {
        if (this.attackState === 'idle') {
            this.attackState = 'windup';
            this.stateTimer = 100;
            this.hasHit = false;
        }
    }
    update(dt) {
        if (this.buffs.dizzy > 0) { this.buffs.dizzy -= dt; return; }

        this.vy += GRAVITY;
        
        if (this.attackState !== 'idle') this.targetVx = 0;
        this.vx += (this.targetVx - this.vx) * 0.25;
        
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.y + this.h >= GROUND_Y) { this.y = GROUND_Y - this.h; this.vy = 0; this.isGrounded = true; }
        else this.isGrounded = false;
        
        if (this.vy > 0) {
            for (let plat of PLATFORMS) {
                if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y && this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                    this.y = plat.y - this.h; this.vy = 0; this.isGrounded = true;
                }
            }
        }
        
        if (this.x < 0) this.x = 0;
        if (this.x > CANVAS_W - this.w) this.x = CANVAS_W - this.w;

        if (this.attackState === 'windup') {
            this.stateTimer -= dt;
            if (this.stateTimer <= 0) {
                this.attackState = 'active';
                this.stateTimer = 100;
                
                let px = this.facing === 1 ? this.x + this.w : this.x - 40;
                let hitBox = { x: px, y: this.y + 10, w: 40, h: 40 };
                let enemy = game.getEnemyOf(this.owner);
                let targetsHit = [];
                if (!enemy.dead && !enemy.untargetable && checkAABB(hitBox, enemy)) targetsHit.push(enemy);
                for (let m of game.minions) {
                    if (m.owner !== this.owner && !m.dead && !m.untargetable && checkAABB(hitBox, m)) targetsHit.push(m);
                }

                if (targetsHit.length > 0) {
                    this.hasHit = true;
                    targetsHit.forEach(t => t.takeDamage(20, this.owner)); 
                }
            }
        } else if (this.attackState === 'active') {
            this.stateTimer -= dt;
            if (this.stateTimer <= 0) {
                this.attackState = 'recovery';
                this.stateTimer = 150;
            }
        } else if (this.attackState === 'recovery') {
            this.stateTimer -= dt;
            if (this.stateTimer <= 0) this.attackState = 'idle';
        }
    }
    draw(ctx) {
        if (this.buffs.dizzy > 0) {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y - 15);
            let timeAngle = Date.now() * 0.005;
            for(let s=0; s<3; s++) {
                let offset = timeAngle + (s * (Math.PI*2/3));
                ctx.fillStyle = "#FFD700"; ctx.fillRect(Math.cos(offset)*10, Math.sin(offset)*3, 3, 3);
            }
            ctx.restore();
        }
        
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        if (this.facing === -1) ctx.scale(-1, 1);
        
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        
        ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-this.w/2, -this.h/2 + 20); ctx.lineTo(this.w/2, -this.h/2 + 20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-this.w/2, -this.h/2 + 40); ctx.lineTo(this.w/2, -this.h/2 + 40); ctx.stroke();
        
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(10, -this.h/2 + 10, 4, 0, Math.PI*2); ctx.fill();

        if (this.attackState !== 'idle') {
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            let ext = this.attackState === 'active' ? 30 : (this.attackState === 'windup' ? 0 : 10);
            ctx.fillRect(this.w/2, -10, ext, 10); 
        }
        
        ctx.restore();

        ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 12, this.w, 4);
        ctx.fillStyle = "#fff"; ctx.fillRect(this.x, this.y - 12, this.w * (this.hp/this.maxHp), 4);
    }
}

class Hurricane extends Entity {

    }

        this.tickTimer += dt;
        if (this.tickTimer >= 200) {
            this.tickTimer = 0;
            let enemy = game.getEnemyOf(this.owner);
            if (checkAABB(this, enemy)) enemy.takeDamage(0.6, this.owner, true);
            for (let m of game.minions) {
                if (m.owner !== this.owner && !m.dead && !m.untargetable && checkAABB(this, m)) m.takeDamage(0.6, this.owner, true);
            }
        }
        this.stunTickTimer += dt;
        if (this.stunTickTimer >= 1000) {
            this.stunTickTimer = 0;
            let targets = [game.getEnemyOf(this.owner), ...game.minions.filter(m => m.owner !== this.owner && !m.untargetable)];
            for (let t of targets) {
                if (!t.dead && checkAABB(this, t)) { t.buffs = t.buffs || {}; t.buffs.dizzy = 500; }

    }
}

        this.williSuperCharges = 0; this.williSuperWindow = 0; this.williDashCooldown = 0;

        this.ugoSummoning = false;

        this.kilaSwitchCD = 0;

            this.maxEnergy = 200;

        }

            this.gensanCombo = 0;

            this.lastY = this.y;

        if (this.heroName === 'Kadaxi') {
            this.comboCount = 0; this.comboTimer = 0;
            this.grappleTarget = null;
        }
    }

    takeDamage(amt, attacker, isDoT = false, noKnockback = false) {
        if (this.dead || this.invincible > 0) return; 

        if (!isDoT) {
            if (this.heroName === 'Kadaxi' && this.grapplePhase === 1) this.breakGrapple();
        }
        
        if (this.heroName === 'Volt' && !isDoT) {
            this.buffs.slow = Math.max(this.buffs.slow || 0, 200); 
        }

        if (this.heroName === 'Artu') amt *= 0.9;
        if (attacker && attacker.buffs && attacker.buffs.battleCry > 0) amt *= 1.4; 

        if (this.heroName === 'Duke' && this.isMounted) {
            this.horseHp -= amt;
            for(let i=0; i<6; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#FFF", (Math.random()-0.5)*12, (Math.random()-0.5)*12, 250));
            if (this.horseHp <= 0) {
                this.isMounted = false; this.horseHp = 0; this.buffs.dizzy = 5000;
                this.baseSpeed = 4.5; this.w = 45; this.h = 70;
                for(let i=0; i<30; i++) game.particles.push(new Particle(this.x, this.y+40, "#8B4513", (Math.random()-0.5)*20, -Math.random()*15, 800, 8));
            }
            return; 
        }

        this.hp -= amt;
        this.stunTimer = 150;
        this.timeSinceLastDamage = 0; 
        
        if (this.heroName === 'Willi' && this.hp < this.maxHp * 0.5 && !this.williHasTriggeredHeal) {
            this.williHasTriggeredHeal = true;
            this.williHealBuffTimer = 5000; 
            for(let i=0; i<30; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#FF0000", (Math.random()-0.5)*10, (Math.random()-0.5)*10, 800, 6));
        }

        if (this.heroName === 'Kae' && this.hp < this.maxHp * 0.5 && !this.kaeAwakened) {
            this.kaeAwakened = true;
            for(let i=0; i<30; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#000000", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 1000, 8));
        }

        if (this.heroName === 'Euclid' || this.heroName === 'Kae' || this.heroName === 'Ugo' || this.heroName === 'Kila' || this.heroName === 'Volt' || this.heroName === 'Gensan') {
            if (this.attackState === 'windup') {
                this.attackState = 'idle';
                this.superWindupTimer = 0;
                this.stateTimer = 0;
                this.ugoSummoning = false;
            }
        }
        
        if (!isDoT && !noKnockback && !this.grappledBy) {
            let direction = attacker ? (this.x + this.w/2 < attacker.x + attacker.w/2 ? -1 : 1) : (this.facing === 1 ? -1 : 1);
            this.vx = direction * (amt * 0.5);
            this.vy = -Math.min(amt * 0.3, 10);
            game.hitstop = 60;
            if (this.heroName === 'Volt') this.flightDisabled = true;
        }
        
        for(let i=0; i<6; i++) {
            let sparkColors = ["#FFA500", "#FFD700", "#FFFFFF"];
            let sColor = sparkColors[Math.floor(Math.random() * sparkColors.length)];
            game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, sColor, (Math.random()-0.5)*12, (Math.random()-0.5)*12, 250));
        }

        if (this.hp <= 0) {
            this.hp = 0; this.dead = true;
            if (this.heroName === 'Kadaxi') this.breakGrapple();
            game.endGame(this.isP1 ? "Player 2" : "Player 1");
        }
    }

    breakGrapple() {
        if (this.grappleTarget) {
            this.grappleTarget.grappledBy = null;
            this.grappleTarget = null;
            this.grapplePhase = 0;
            this.grappleTimer = 0;
        }
    }

    update(dt) {
        if (this.dead) return;

        if (this.grappledBy) {
            this.x = this.grappledBy.x + this.grappledBy.facing * 40;
            this.y = this.grappledBy.y;
            this.vx = 0; this.vy = 0;
            return; 
        }

        if (this.waterStunImmunity > 0) this.waterStunImmunity -= dt;
        if (this.kilaSwitchCD > 0) this.kilaSwitchCD -= dt;

        if (this.invincible > 0) this.invincible -= dt;
        if (this.flipCooldown > 0) this.flipCooldown -= dt; 
        if (this.williDashCooldown > 0) this.williDashCooldown -= dt; 
        if (this.williHealBuffTimer > 0) {
            this.williHealBuffTimer -= dt;
            if (Math.random() < 0.2) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#FF0000", 0, -2, 300, 3));
        }
        if (this.buffs.msBoost > 0) this.buffs.msBoost -= dt;
        
        if (this.flipActive > 0) {
            this.flipActive -= dt;
            if (this.heroName === 'Kadaxi') {
                let enemy = game.getEnemyOf(this);
                if (!this.hasHitFlip && checkAABB(this, enemy)) {
                    enemy.takeDamage(63, this); 
                    this.hasHitFlip = true;
                }
            }
        }

        if (this.heroName === 'Gensan') {
            if (this.gensanSwitchCD > 0) this.gensanSwitchCD -= dt;
            let distMoved = Math.hypot(this.x - this.lastX, this.y - this.lastY);
            if (distMoved > 1) {
                this.gensanMoveTimer += dt;
                if (this.gensanMoveTimer >= 5000) {
                    this.gensanMoveTimer = 0;
                    let shadow = new SwordShadow(this, this.x, this.y);
                    this.gensanShadows.push(shadow);
                    game.minions.push(shadow);
                    if (this.gensanShadows.length > 2) {
                        let oldShadow = this.gensanShadows.shift();
                        oldShadow.dead = true;
                    }
                    for(let i=0; i<15; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#fff", (Math.random()-0.5)*5, (Math.random()-0.5)*5, 400));
                }
            } else {
                this.gensanMoveTimer = Math.max(0, this.gensanMoveTimer - dt * 2); // decay quickly if standing still
            }
            this.lastX = this.x;
            this.lastY = this.y;
            this.gensanShadows = this.gensanShadows.filter(s => !s.dead);
        }

        if (this.heroName === 'Volt') {
            if (this.overdriveTimer > 0) {
                this.overdriveTimer -= dt;
                this.energy = this.maxEnergy;
                this.isOverloaded = false;
                if (this.overdriveTimer <= 0) {
                    this.energy = 50;
                    this.isOverloaded = true;
                }
            } else {
                if (this.isOverloaded) {
                    this.energy += 25 * (dt / 1000);
                    if (this.energy >= 100) {
                        this.isOverloaded = false;
                    }
                } else {
                    if (this.isGrounded) {
                        this.energy += 15 * (dt / 1000);
                    } else {
                        this.energy -= 15 * (dt / 1000);
                    }
                }
                this.energy = Math.max(0, Math.min(this.maxEnergy, this.energy));

                if (this.energy <= 0 && !this.isOverloaded && this.overdriveTimer <= 0) {
                    this.energy = 0;
                    this.isOverloaded = true;
                    this.takeDamage(30, null, true, true); 
                    game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ff0000", 0, 0, 500, 15));
                }
            }
        }

        if (this.heroName === 'Kadaxi') {
            if (this.comboTimer > 0) {
                this.comboTimer -= dt;
                if (this.comboTimer <= 0) this.comboCount = 0;
            }
            if (this.grapplePhase === 1) {
                this.grappleTimer -= dt;
                if (Math.random() < 0.3) game.particles.push(new Particle(this.x + this.facing*50 + Math.random()*20, this.y + Math.random()*this.h, "#1E90FF", -this.facing*5, 0, 200));
                if (this.grappleTimer <= 0) this.breakGrapple(); 
            }
        }

        if (this.heroName === 'Euclid') {
            if (this.euclidSwitchTimer > 0) {
                this.euclidSwitchTimer -= dt;
            }
        }

        if (this.heroName === 'Kae') {
            if (this.kaeAggroTimer > 0) this.kaeAggroTimer -= dt;
        }

        let activePuppet = null;
        let hasPuppet = false;
        if (this.heroName === 'Ugo') {
            activePuppet = game.minions.find(m => m.type === 'puppet' && m.owner === this && !m.dead);
            hasPuppet = !!activePuppet;
        }
        
        if (this.buffs.bloodFrenzy > 0) {
            this.buffs.bloodFrenzy -= dt;
            if (Math.random() < 0.3) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#B22222", 0, -3, 300, 4));
            
            if (this.buffs.bloodFrenzy <= 0) {
                let px = this.facing === 1 ? this.x + this.w : this.x - 10;
                let py = this.y + 25;
                game.projectiles.push(new Projectile(px, py, 25, 25, this.facing * 20, 0, 103, this, "#B22222", "thrown_axe"));
            }
        }

        let currentSpeed = this.baseSpeed;
        let currentJump = this.baseJump;
        
        if (this.buffs.msBoost > 0) currentSpeed *= 1.2;

        if (this.buffs.dizzy > 0) {
            this.buffs.dizzy -= dt;
            if (this.attackState !== 'idle') this.attackState = 'idle';
            if (this.heroName === 'Volt') this.flightDisabled = true;
        }
        if (this.buffs.slow > 0) {
            this.buffs.slow -= dt; currentSpeed *= 0.5; 
            if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#add8e6", (Math.random()-0.5)*2, -2, 300));
        }
        if (this.buffs.burn > 0) {
            this.buffs.burn -= dt;
            this.burnTick += dt;
            if (this.burnTick >= 1000) {
                this.takeDamage(5, null, true); // 0.5 WRD per sec
                this.burnTick = 0;
            }
            if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y, "#ff4500", 0, -2, 300));
        }
        if (this.buffs.poison > 0) {
            this.buffs.poison -= dt;
            if (!(this.heroName === 'Duke' && this.isMounted && this.runTimer > 0 && this.runTimer <= 3000)) currentSpeed *= 0.6;
            if (Math.floor(this.buffs.poison/1000) !== Math.floor((this.buffs.poison+dt)/1000)) this.takeDamage(2, null, true);
            if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y, "#00ff00", 0, -2, 300));
        }
        if (this.buffs.battleCry > 0) {
            this.buffs.battleCry -= dt; 
            currentJump *= 1.2; 
            currentSpeed *= 1.4; 
            if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ff4500", 0, -3, 300));
        }
        if (this.buffs.shade > 0) this.buffs.shade -= dt;
        
        if (this.buffs.bloodFrenzy > 0) {
            currentSpeed *= 0.9; 
        }

        if (this.heroName === 'Kae' && this.kaeAwakened) {
            currentSpeed *= 2.0; 
            if (Math.random() < 0.3) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#000000", 0, -2, 300, 4));
        }

        if (this.heroName === 'Kila' && this.kilaSwitchTimer > 0) {
            this.kilaSwitchTimer -= dt;
            this.invincible = Math.max(this.invincible, 100);
            currentSpeed *= 0.5; 
            if (this.kilaSwitchTimer <= 0) {
                if (this.kilaElement === 'fire') this.kilaElement = 'water';
                else if (this.kilaElement === 'water') this.kilaElement = 'earth';
                else this.kilaElement = 'fire';
                this.kilaSwitchCD = 8000;
            }
        }
        
        this.buffs.hurricaneSlow = false;
        if (game.hurricane && !game.hurricane.dead && game.hurricane.owner !== this) {
            if (checkAABB(this, game.hurricane)) {
                if (!(this.heroName === 'Duke' && this.isMounted && this.runTimer > 0 && this.runTimer <= 3000)) {
                    this.buffs.hurricaneSlow = true; currentSpeed *= 0.4;
                }
            }
        }

        if (this.superCooldown > 0) this.superCooldown -= dt;
        if (this.stunTimer > 0) this.stunTimer -= dt;
        if (this.hunterMusketCD > 0) this.hunterMusketCD -= dt;

        if (this.hasonSuperWindow > 0) { this.hasonSuperWindow -= dt; if (this.hasonSuperWindow <= 0) this.hasonSuperCharges = 0; }
        if (this.williSuperWindow > 0) { this.williSuperWindow -= dt; if (this.williSuperWindow <= 0) this.williSuperCharges = 0; }

        let isKilaSwitching = this.heroName === 'Kila' && this.kilaSwitchTimer > 0;
        let canAct = (this.stunTimer <= 0 && this.buffs.dizzy <= 0 && this.grapplePhase !== 1 && this.superWindupTimer <= 0 && this.euclidSwitchTimer <= 0 && !isKilaSwitching);
        let canMoveAndAttack = canAct && !hasPuppet;

        let applyGravity = true;

        if (this.heroName === 'Volt' && !this.isOverloaded && (this.overdriveTimer > 0 || this.energy > 0) && canAct && !this.flightDisabled) {
            if (!this.isGrounded || keys[this.controls.jump]) {
                applyGravity = false;
                this.vy *= 0.85; 
                if (keys[this.controls.jump]) this.vy -= 1.2;
                if (keys[this.controls.down]) this.vy += 1.2;
                if (!this.isGrounded && Math.random() < 0.3) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#00FFFF", (Math.random()-0.5)*2, Math.random()*2, 200, 3));
            }
        } else {
            if (keysPressed[this.controls.jump]) {
                if (hasPuppet && canAct) {
                    activePuppet.doJump();
                } else {
                    this.jumpBuffer = 150;
                    if (!this.isGrounded && !this.hasFlipped && (canMoveAndAttack && this.flipCooldown <= 0)) {
                        let now = performance.now();
                        if (now - this.lastJumpTime <= 500) {
                            this.flipActive = 400;
                            this.hasHitFlip = false;
                            this.hasFlipped = true; 
                            this.vy = -10; 
                            this.flipCooldown = 3000; 
                            this.jumpBuffer = 0; 
                        }
                    }
                }
            } else if (this.jumpBuffer > 0) this.jumpBuffer -= dt;
        }

        if (this.isGrounded) { 
            this.coyoteTime = 100; 
            this.jumpsLeft = this.maxJumps; 
            this.hasFlipped = false; 
            this.flightDisabled = false;
        } 
        else { this.coyoteTime -= dt; }

        this.timeSinceLastDamage += dt;

        if (this.heroName === 'Hason') {
            if (this.hasonAmmo <= 0) {
                this.hasonReloadTimer += dt;
                if (this.hasonReloadTimer >= 2000) {
                    this.hasonAmmo = 6;
                    this.hasonReloadTimer = 0;
                }
            } else if (this.hasonAmmo < 6 && this.timeSinceLastDamage >= 5000) {
                this.hasonAmmo = 6;
            }
        }

        if (this.superWindupTimer > 0) {
            this.superWindupTimer -= dt;
            
            if (this.heroName === 'Euclid') {
                if (Math.random() < 0.2) game.particles.push(new Particle(this.x + this.w/2, this.y + this.h, "#8A2BE2", (Math.random()-0.5)*5, -Math.random()*5, 400));
                if (this.superWindupTimer <= 0) {
                    this.superCooldown = this.superCooldownMax;
                    let currentSkeletons = game.minions.filter(m => m.type === 'skeleton' && m.owner === this);
                    currentSkeletons.forEach(s => s.dead = true);
                    for (let i = 0; i < 8; i++) {
                        let randomX = 50 + Math.random() * (CANVAS_W - 100);
                        game.minions.push(new Skeleton(this, randomX, GROUND_Y - 60));
                        for(let j=0; j<10; j++) game.particles.push(new Particle(randomX + 17, GROUND_Y - 30, "#8A2BE2", (Math.random()-0.5)*8, (Math.random()-0.5)*8, 400));
                    }
                    game.createExplosion(this.x + this.w/2, this.y + this.h/2, 100, 0, this); 
                }
            } else if (this.heroName === 'Kae') {
                if (Math.random() < 0.5) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#00FFFF", (Math.random()-0.5)*2, -Math.random()*5, 200, 3));
                if (this.superWindupTimer <= 0) {
                    let enemy = game.getEnemyOf(this);
                    
                    if (enemy.invincible <= 0 && !enemy.dead) {
                        this.superCooldown = this.superCooldownMax;
                        let behindX = enemy.facing === 1 ? enemy.x - this.w - 10 : enemy.x + enemy.w + 10;
                        let targetY = enemy.y;
                        let closestPlatY = GROUND_Y;

                        for (let plat of PLATFORMS) {
                            if (behindX + this.w > plat.x && behindX < plat.x + plat.w) {
                                if (plat.y >= enemy.y && plat.y < closestPlatY) {
                                    closestPlatY = plat.y;
                                }
                            }
                        }
                        targetY = closestPlatY - this.h;

                        this.x = behindX;
                        this.y = targetY;
                        this.facing = enemy.facing; 

                        if (this.x < 0) this.x = 0;
                        if (this.x > CANVAS_W - this.w) this.x = CANVAS_W - this.w;

                        enemy.buffs.dizzy = 1000;
                        this.attackState = 'idle'; 
                        this.vy = 0;

                        for(let i=0; i<30; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#00FFFF", (Math.random()-0.5)*20, (Math.random()-0.5)*20, 400, 5));
                        for(let i=0; i<20; i++) game.particles.push(new Particle(enemy.x+enemy.w/2, enemy.y+enemy.h/2, "#FFFF00", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 300, 4));

                        this.kaeAggroTimer = 1500;
                    } else {
                        this.superCooldown = 3000;
                    }
                }
            }
        }

        let targetVx = 0;
        if (this.heroName === 'Willi' && this.invincible > 0) {
            targetVx = this.facing * 40;
        } else if (canMoveAndAttack && this.flipActive <= 0) {
            if (keys[this.controls.left]) { targetVx = -currentSpeed; this.facing = -1; } 
            else if (keys[this.controls.right]) { targetVx = currentSpeed; this.facing = 1; }
            
            if (this.attackState === 'windup' && (this.heroName === 'Euclid' || this.heroName === 'Kae' || this.heroName === 'Ugo' || this.heroName === 'Volt' || this.heroName === 'Gensan')) targetVx = 0;

            if (this.heroName === 'Duke' && this.isMounted) {
                if ((keys[this.controls.left] || keys[this.controls.right]) && this.attackState === 'idle') this.runTimer += dt;
                else this.runTimer = 0;
            }
        } else {
            if (this.heroName === 'Duke') this.runTimer = 0;
        }

        if (hasPuppet && canAct) {
            if (keys[this.controls.left]) { activePuppet.targetVx = -activePuppet.speed; activePuppet.facing = -1; }
            else if (keys[this.controls.right]) { activePuppet.targetVx = activePuppet.speed; activePuppet.facing = 1; }
            else { activePuppet.targetVx = 0; }
        } else if (activePuppet) {
            activePuppet.targetVx = 0;
        }

        let friction = 0.25;
        if (this.currentPlatform && this.currentPlatform.type === 'center') friction = 0.03; 
        if (!canAct || ((this.heroName === 'Euclid' || this.heroName === 'Kae' || this.heroName === 'Ugo' || this.heroName === 'Volt' || this.heroName === 'Gensan') && this.attackState === 'windup') || hasPuppet) friction = 0.1; 
        
        this.vx += (targetVx - this.vx) * friction;

        if (canAct && this.flipActive <= 0) {
            if (this.attackState === 'windup') {
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    if (this.ugoSummoning) {
                        this.ugoSummoning = false;
                        let pX = this.facing === 1 ? this.x + this.w + 40 : this.x - 40 - 35;
                        pX = Math.max(0, Math.min(CANVAS_W - 35, pX));
                        game.minions.push(new Puppet(this, pX, this.y));
                        
                        this.attackState = 'recovery';
                        this.stateTimer = 200;
                        this.maxStateTimer = 200;
                        for(let i=0; i<15; i++) game.particles.push(new Particle(pX+17, this.y+35, "#fff", (Math.random()-0.5)*5, -Math.random()*10, 400, 3));
                    } else {
                        let activeTime = 150;
                        if (this.heroName === 'Lique') activeTime = this.buffs.bloodFrenzy > 0 ? 50 : 100;
                        if (this.heroName === 'Kae') activeTime = 100;
                        if (this.heroName === 'Ugo') activeTime = 100;
                        if (this.heroName === 'Kila') activeTime = 150;
                        if (this.heroName === 'Volt') activeTime = this.overdriveTimer > 0 ? 25 : 50;
                        if (this.heroName === 'Gensan') activeTime = 150;
                        
                        this.attackState = 'active';
                        this.stateTimer = activeTime; this.maxStateTimer = activeTime;
                        this.executeActiveAttack();
                    }
                }
            } else if (this.attackState === 'active') {
                this.stateTimer -= dt;
                
                if (!this.hasHit && this.isMeleeAttack()) {
                    let hitBox = this.getMeleeHitbox();
                    let enemy = game.getEnemyOf(this);
                    
                    let targetsHit = [];
                    if (!enemy.dead && !enemy.untargetable && checkAABB(hitBox, enemy)) {
                        enemy.takeDamage(this.getMeleeDamage(), this);
                        targetsHit.push(enemy);
                    }
                    for (let m of game.minions) {
                        if (m.owner !== this && !m.dead && !m.untargetable && checkAABB(hitBox, m)) {
                            m.takeDamage(this.getMeleeDamage(), this);
                            targetsHit.push(m);
                        }
                    }

                    if (targetsHit.length > 0) {
                        this.hasHit = true;

                        targetsHit.forEach(t => {
                            if (this.heroName === 'Macu' && this.buffs.battleCry > 0 && t.buffs) t.buffs.poison = 3000;
                            if (this.heroName === 'Duke' && this.isMounted && t.buffs) t.buffs.dizzy = 3000; 

                            if (this.heroName === 'Lique' && this.buffs.bloodFrenzy > 0 && t.heroName) {
                                this.hp = Math.min(this.maxHp, this.hp + 5); 
                                for(let i=0; i<5; i++) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#ff0000", 0, -2, 300, 3));
                            }
                        });
                        
                        if (this.heroName === 'Kae') {
                            this.kaeComboCount++;
                            if (this.kaeComboCount >= 4) {
                                this.kaeComboCount = 0;
                                targetsHit.forEach(t => {
                                    let extraDmg = this.kaeAwakened ? 14 : 10;
                                    t.takeDamage(extraDmg, this);
                                    if (t.buffs) t.buffs.dizzy = 1000; 
                                    for(let i=0; i<10; i++) game.particles.push(new Particle(t.x + t.w/2, t.y + t.h/2, "#00FFFF", (Math.random()-0.5)*10, (Math.random()-0.5)*10, 300, 5));
                                });
                            } else {
                                targetsHit.forEach(t => {
                                    for(let i=0; i<5; i++) game.particles.push(new Particle(t.x + t.w/2, t.y + t.h/2, "#FFFF00", (Math.random()-0.5)*5, (Math.random()-0.5)*5, 200, 3));
                                });
                            }
                        }

                        if (this.heroName === 'Gensan') {
                            this.gensanCombo++;
                            if (this.gensanCombo >= 4) {
                                this.gensanCombo = 0;
                                targetsHit.forEach(t => {
                                    t.takeDamage(13, this); 
                                    if (t.buffs) t.buffs.slow = 1200;
                                });
                            }
                        }

                        if (this.heroName === 'Duke' && !this.isMounted) {
                            this.hp = Math.min(this.maxHp, this.hp + 15); 
                            for(let i=0; i<8; i++) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#32CD32", 0, -Math.random()*4, 500, 5));
                        }
                    }
                }
                
                if (this.stateTimer <= 0) {
                    let recTime = 250;
                    if (this.heroName === 'Hason') recTime = 100;
                    if (this.heroName === 'Kadaxi') recTime = 200;
                    if (this.heroName === 'Lique') recTime = this.buffs.bloodFrenzy > 0 ? 90 : 180;
                    if (this.heroName === 'Kae') recTime = this.kaeAwakened ? 100 : 200; 
                    if (this.heroName === 'Ugo') recTime = 150;
                    if (this.heroName === 'Kila') recTime = 200;
                    if (this.heroName === 'Volt') recTime = this.overdriveTimer > 0 ? 75 : 150;
                    if (this.heroName === 'Gensan') recTime = 150;
                    
                    this.attackState = 'recovery';
                    this.stateTimer = recTime; 
                    this.maxStateTimer = this.stateTimer;
                }
            } else if (this.attackState === 'recovery') {
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) this.attackState = 'idle';
            }

            if (keysPressed[this.controls.switch]) {
                if (this.heroName === 'Hunter') {
                    this.hunterWeapon = this.hunterWeapon === 'musket' ? 'sword' : 'musket';
                    this.hunterMusketCD = 0; 
                } else if (this.heroName === 'Euclid') {
                    this.euclidWeapon = this.euclidWeapon === 'magic' ? 'sword' : 'magic';
                    this.euclidSwitchTimer = 2000;
                    this.invincible = 2000;
                    this.attackState = 'idle';
                    for(let i=0; i<20; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#8A2BE2", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 800, 6));
                } else if (this.heroName === 'Ugo' && this.attackState === 'idle') {
                    if (activePuppet) {
                        activePuppet.dead = true; 
                        game.createExplosion(activePuppet.x + activePuppet.w/2, activePuppet.y + activePuppet.h/2, 90, 100, this, false, 500); 
                        for(let i=0; i<30; i++) game.particles.push(new Particle(activePuppet.x+activePuppet.w/2, activePuppet.y+activePuppet.h/2, "#fff", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 600, 5));
                    } else {
                        this.attackState = 'windup';
                        this.stateTimer = 800;
                        this.maxStateTimer = 800;
                        this.ugoSummoning = true;
                        this.vx = 0;
                    }
                } else if (this.heroName === 'Kila' && this.attackState === 'idle') {
                    if (this.kilaSwitchCD <= 0 && this.kilaSwitchTimer <= 0) {
                        this.kilaSwitchTimer = 2000;
                        this.attackState = 'idle';
                        let c = this.kilaElement === 'fire' ? "#1E90FF" : (this.kilaElement === 'water' ? "#8B4513" : "#ff4500");
                        for(let i=0; i<30; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, c, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 800, 6));
                    }
                } else if (this.heroName === 'Gensan') {
                    if (this.gensanSwitchCD <= 0 && this.gensanShadows.length > 0) {
                        let targetShadow = this.gensanShadows[0];
                        let maxD = 0;
                        for(let s of this.gensanShadows) {
                            let d = Math.hypot(this.x - s.x, this.y - s.y);
                            if (d > maxD) { maxD = d; targetShadow = s; }
                        }
                        for(let i=0; i<20; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#fff", (Math.random()-0.5)*10, (Math.random()-0.5)*10, 400));
                        this.x = targetShadow.x;
                        this.y = targetShadow.y;
                        targetShadow.dead = true;
                        this.gensanSwitchCD = 6000;
                        this.invincible = 200;
                        this.buffs.msBoost = 500;
                        for(let i=0; i<20; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#fff", (Math.random()-0.5)*10, (Math.random()-0.5)*10, 400));
                    }
                }
            }
            if (keysPressed[this.controls.attack] && this.attackState === 'idle') {
                if (hasPuppet) {
                    activePuppet.doAttack();
                } else {
                    this.performAttack();
                }
            }
        }
        
        if (canAct || this.grapplePhase === 1) {
            if (keysPressed[this.controls.super] && (this.superCooldown <= 0 || (this.heroName === 'Hason' && this.hasonSuperCharges > 0) || (this.heroName === 'Willi' && this.williSuperCharges > 0) || this.grapplePhase === 1)) {
                this.performSuper();
            }
        }

        if (applyGravity) {
            this.vy += GRAVITY;
            if (this.vy > 0) this.vy += GRAVITY * 0.4;
        }

        if (!keys[this.controls.jump] && this.vy < 0 && applyGravity) this.vy *= 0.8;

        if (this.jumpBuffer > 0 && canMoveAndAttack && applyGravity) {
            if (this.coyoteTime > 0 || this.jumpsLeft > 0) {
                if (this.coyoteTime <= 0) this.jumpsLeft--; else this.coyoteTime = 0;
                this.vy = -currentJump; this.isGrounded = false; this.jumpBuffer = 0;
                game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ccc", -2, 0, 200));
                game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ccc", 2, 0, 200));
                
                this.lastJumpTime = performance.now(); 
            }
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) { this.x = 0; }
        if (this.x + this.w > CANVAS_W) { this.x = CANVAS_W - this.w; }

        this.isGrounded = false; this.currentPlatform = null;

        if (this.y + this.h >= GROUND_Y) { this.y = GROUND_Y - this.h; this.vy = 0; this.isGrounded = true; }

        if (this.vy > 0) {
            for (let plat of PLATFORMS) {
                if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y) {
                    if (this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                        let dropKey = this.controls.down;
                        if (!keys[dropKey]) {
                            this.y = plat.y - this.h; this.vy = 0; this.isGrounded = true; this.currentPlatform = plat;
                        }
                    }
                }
            }
        }
    }

    isMeleeAttack() {
        if (this.heroName === 'Hason' || this.heroName === 'Willi' || this.heroName === 'Ugo' || this.heroName === 'Kila' || this.heroName === 'Volt') return false;
        if (this.heroName === 'Euclid' && this.euclidWeapon === 'magic') return false;
        if (this.heroName === 'Hunter' && this.hunterWeapon === 'musket') return false;
        if (this.heroName === 'Kadaxi' && this.comboCount === 3) return false; 
        return true;
    }

    getMeleeHitbox() {
        let range = 50; let yOffset = 10; let h = 40;
        if (this.heroName === 'Hunter' && this.hunterWeapon === 'sword') range = 70;
        if (this.heroName === 'Artu' || (this.heroName === 'Duke' && !this.isMounted) || this.heroName === 'Kadaxi') range = 65;
