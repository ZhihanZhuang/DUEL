<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otokojuku: Legends Duel - WAN Online</title>
    <!-- 引入外部样式表 -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* 额外添加一些联机大厅需要的临时样式，确保布局美观 */
        .input-box { padding: 12px 20px; font-size: 1.2rem; background: rgba(0,0,0,0.5); border: 2px solid #444; color: white; border-radius: 5px; text-align: center; outline: none; transition: border 0.3s;}
        .input-box:focus { border-color: var(--primary); }

        .hero-card { background: #222; border: 2px solid #444; border-radius: 5px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; min-width: 100px; flex: 1; font-weight: bold; }
        .hero-card:hover { background: #333; border-color: #777; }
        .hero-card.selected-p1 { border-color: var(--primary); background: rgba(201,42,42,0.2); box-shadow: 0 0 10px var(--primary); }
        .hero-card.selected-p2 { border-color: #2196f3; background: rgba(33,150,243,0.2); box-shadow: 0 0 10px #2196f3; }

        .msg { padding: 5px 8px; border-radius: 4px; background: #222; word-wrap: break-word; color: #eee; font-size: 0.9rem; }
        .msg.sys { color: #aaa; font-style: italic; background: none; }

        #ping-display { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 12px; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 10px; z-index: 100; }

        .roster-grid { display: flex; flex-wrap: wrap; gap: 8px; max-height: 300px; overflow-y: auto; padding: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 核心画布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 游戏内 HUD (血条和状态) -->
    <div id="game-ui" class="hidden">
        <div id="hud-p1" class="hud-player">
            <div class="hud-name" id="p1-name">P1</div>
            <div class="bar-container"><div id="p1-hp" class="health-bar" style="width: 100%"></div></div>
            <div class="bar-container hidden" id="p1-horse-container"><div id="p1-horse-hp" class="horse-bar" style="width: 100%"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p1-super" class="super-bar" style="width: 0%"></div></div>
            <div class="status-text" id="p1-status"></div>
        </div>

        <!-- 网络延迟/状态显示 -->
        <div id="ping-display" class="hidden">连接中...</div>

        <div id="hud-p2" class="hud-player">
            <div class="hud-name" id="p2-name">P2</div>
            <div class="bar-container"><div id="p2-hp" class="health-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container hidden" id="p2-horse-container"><div id="p2-horse-hp" class="horse-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p2-super" class="super-bar" style="width: 0%; float: right;"></div></div>
            <div class="status-text" id="p2-status"></div>
        </div>
        <div id="dynamic-prompts"></div>
    </div>

    <!-- 主菜单界面 -->
    <div id="menu-screen" class="screen">
        <h1>Otokojuku: Legends Duel</h1>
        <h2>选择你的英雄</h2>

        <div class="menu-content">
            <div class="selection-container">
                <div class="player-select">
                    <h3>Player 1</h3>
                    <div id="p1-roster"></div>
                    <div class="controls-info" id="p1-controls-display"></div>
                </div>
                <div class="player-select">
                    <h3>Player 2</h3>
                    <div id="p2-roster"></div>
                    <div class="controls-info" id="p2-controls-display"></div>
                </div>
            </div>
            <div class="hero-info-panel" id="hero-info-panel">
                <h3 id="info-name">悬停查看英雄</h3>
                <div class="info-desc" id="info-desc">选择英雄以查看其技能和被动。</div>
                <div id="info-details"></div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-start" id="btn-sp">单机模式 (VS CPU)</button>
            <button class="btn-start" id="btn-mp">双人同屏</button>
            <!-- 👇 这就是缺失的那个蓝色联机按钮 👇 -->
            <button class="btn-start" id="btn-online" style="background: #2196f3; box-shadow: 0 4px 0 #0d47a1;">Online Multiplayer</button>
            <button class="btn-settings" id="btn-open-settings">⚙ 设置</button>
        </div>
    </div>

    <!-- 联机：设置昵称与连接 -->
    <div id="login-screen" class="screen hidden">
        <h1>联机对战</h1>
        <h2 id="login-title">设置玩家资料</h2>
        <input type="text" id="username-input" class="input-box" placeholder="输入你的昵称" maxlength="12" style="font-size:1.5rem; margin-bottom:20px; width: 300px;">
        <button class="btn-start" id="btn-login" style="background: #2196f3; box-shadow: 0 4px 0 #0d47a1;">连接至服务器</button>

        <!-- 房间匹配控制 UI -->
        <div id="room-match-ui" class="hidden" style="margin-top: 30px; display:flex; flex-direction:column; gap:20px; align-items:center;">
            <button class="btn-start" id="btn-create-room">创建新房间</button>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 5px; border: 1px solid #444; display: flex; flex-direction: column; align-items: center;">
                <input type="text" id="join-room-code" class="input-box" placeholder="输入房间代码" maxlength="4" style="text-align:center; font-size:2rem; letter-spacing:5px; text-transform:uppercase; width:200px;">
                <button class="btn-start" id="btn-join-room" style="background:#4caf50; box-shadow: 0 4px 0 #2e7d32;">加入房间</button>
            </div>
        </div>

        <button class="btn-settings" id="btn-login-cancel" style="margin-top: 30px;">返回本地菜单</button>
        <div id="login-status" style="margin-top: 15px; color: #aaa;">准备连接...</div>
    </div>

    <!-- 联机：房间内大厅 -->
    <div id="room-screen" class="screen hidden">
        <h1 style="font-size: 2.5rem; color: #2196f3;">联机大厅 - 房间号: <span id="display-room-code" style="color: var(--accent);">----</span></h1>

        <div style="display: flex; gap: 20px; width: 90%; max-width: 1200px; height: 75vh;">
            <!-- 英雄选择区 -->
            <div style="flex: 2; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 10px; padding: 20px; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 8px;">
                    <div style="text-align: center; width: 45%; color: var(--primary);">
                        <div style="font-weight: bold; font-size:1.5rem;">[房主] <span id="room-p1-name">等待中...</span></div>
                        <div style="font-size: 1rem; color: #ccc; margin-top:5px;">已选: <span id="room-p1-hero" style="color:#fff;">未选择</span></div>
                    </div>
                    <div style="font-size: 2.5rem; font-weight: bold; color: #fff; align-self: center;">VS</div>
                    <div style="text-align: center; width: 45%; color: #2196f3;">
                        <div style="font-weight: bold; font-size:1.5rem;">[挑战者] <span id="room-p2-name">等待加入...</span></div>
                        <div style="font-size: 1rem; color: #ccc; margin-top:5px;">已选: <span id="room-p2-hero" style="color:#fff;">未选择</span></div>
                    </div>
                </div>
                <h3 style="margin-top: 0; color: #aaa;">选择你的英雄</h3>
                <div id="room-hero-grid" class="roster-grid"></div>
                <div style="margin-top: auto; text-align: center; padding-top: 20px;">
                    <button class="btn-start" id="btn-start-game" style="font-size: 1.5rem; padding: 15px 50px; display: none;">开始战斗</button>
                    <div id="room-status-text" style="color: #ffeb3b; margin-top: 15px; font-size:1.1rem; font-weight:bold;">等待对手加入...</div>
                </div>
            </div>

            <!-- 聊天区 -->
            <div style="flex: 1; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 10px; padding: 20px; display: flex; flex-direction: column;">
                <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">房间聊天</h3>
                <div id="chat-messages" style="flex: 1; background: #111; border-radius: 5px; padding: 10px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #333; display: flex; flex-direction: column; gap: 8px;"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" class="input-box" placeholder="输入消息..." maxlength="50" style="flex: 1; margin:0; padding:10px;">
                    <button id="btn-send-chat" class="btn-start" style="padding: 10px 20px; background: var(--accent); color: #000;">发送</button>
                </div>
                <button class="btn-settings" id="btn-leave-room" style="margin-top: 20px; width: 100%;">离开房间</button>
            </div>
        </div>
    </div>

    <!-- 按键设置界面 -->
    <div id="settings-screen" class="screen hidden">
        <h1 style="color: white;">按键绑定</h1>
        <div class="settings-grid">
            <div class="player-select">
                <h3 style="color: var(--primary);">Player 1</h3>
                <div id="p1-bindings"></div>
            </div>
            <div class="player-select">
                <h3 style="color: #2196f3;">Player 2</h3>
                <div id="p2-bindings"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-settings" id="btn-reset-bindings">恢复默认</button>
            <button class="btn-start" id="btn-close-settings">保存并关闭</button>
        </div>
    </div>

    <!-- 游戏结束结算界面 -->
    <div id="game-over-screen" class="screen hidden" style="z-index: 20; background: rgba(0,0,0,0.95);">
        <div id="winner-text">Player 1 Wins!</div>
        <button class="btn-start" id="btn-restart" style="font-size: 1.2rem; padding: 15px 40px; margin-top: 20px;">返回房间/菜单</button>
    </div>
</div>

<!-- 加载脚本：必须先加载核心逻辑，再加载网络模块 -->
<script src="game.js"></script>
<script type="module" src="network.js"></script>

</body>
</html>
