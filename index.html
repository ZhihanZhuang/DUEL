<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otokojuku: Legends Duel</title>
    <style>
        :root {
            --primary: #c92a2a;
            --bg-dark: #1a1a1a;
            --ui-bg: rgba(0, 0, 0, 0.85);
            --text-main: #f1f3f5;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 1000px;
            height: 600px;
            box-shadow: 0 0 20px rgba(201, 42, 42, 0.3);
            background: linear-gradient(to bottom, #2b3a42 0%, #1c252a 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .hidden { display: none !important; }
        h1 {
            color: var(--primary);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #000;
        }
        h2 { margin-bottom: 30px; font-weight: 300; }

        .selection-container {
            display: flex;
            gap: 50px;
            margin-bottom: 30px;
        }
        .player-select {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
            width: 350px;
        }
        .player-select h3 { margin-top: 0; text-align: center; color: #ffeb3b; }

        .hero-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            border-radius: 4px;
        }
        .hero-btn:hover { background: #444; }
        .hero-btn.selected {
            background: var(--primary);
            border-color: #ff5252;
            font-weight: bold;
        }

        .controls-info {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
        .controls-info span { color: #fff; font-weight: bold; }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-start:hover { background: #e03131; transform: scale(1.05); }
        .btn-start:active { transform: scale(0.95); }

        /* In-Game UI Overlay */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .hud-player {
            position: absolute;
            top: 20px;
            width: 350px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
        }
        #hud-p1 { left: 20px; }
        #hud-p2 { right: 20px; text-align: right; }

        .hud-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .bar-container {
            width: 100%; height: 20px; background: #333; margin-bottom: 5px; border-radius: 3px; overflow: hidden;
            border: 1px solid #111;
        }
        .health-bar { height: 100%; background: #4caf50; transition: width 0.1s; }
        .super-bar { height: 100%; background: #2196f3; transition: width 0.1s; }
        .super-bar.ready { background: #ffeb3b; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; box-shadow: 0 0 10px #ffeb3b; } }

        .status-text { font-size: 0.8rem; color: #ccc; min-height: 16px; }

        #game-over {
            text-align: center;
        }
        #winner-text {
            font-size: 3rem;
            color: #ffeb3b;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <!-- Game UI Overlay -->
    <div id="game-ui" class="hidden">
        <div id="hud-p1" class="hud-player">
            <div class="hud-name" id="p1-name">P1 Name</div>
            <div class="bar-container"><div id="p1-hp" class="health-bar" style="width: 100%"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p1-super" class="super-bar" style="width: 0%"></div></div>
            <div class="status-text" id="p1-status"></div>
        </div>
        <div id="hud-p2" class="hud-player">
            <div class="hud-name" id="p2-name">P2 Name</div>
            <div class="bar-container"><div id="p2-hp" class="health-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container" style="height:10px;"><div id="p2-super" class="super-bar" style="width: 0%; float: right;"></div></div>
            <div class="status-text" id="p2-status"></div>
        </div>
    </div>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen">
        <h1>Otokojuku: Legends Duel</h1>
        <h2>Select Your Heroes</h2>

        <div class="selection-container">
            <!-- P1 Select -->
            <div class="player-select">
                <h3>Player 1</h3>
                <div id="p1-roster"></div>
                <div class="controls-info">
                    Move: <span>W, A, S, D</span><br>
                    Attack: <span>Space</span><br>
                    Super Skill (45s): <span>E</span><br>
                    Switch Weapon: <span>T</span> (Hunter Only)
                </div>
            </div>

            <!-- P2 Select -->
            <div class="player-select">
                <h3>Player 2</h3>
                <div id="p2-roster"></div>
                <div class="controls-info">
                    Move: <span>Arrows (↑, ←, ↓, →)</span><br>
                    Attack: <span>Right Ctrl</span><br>
                    Super Skill (45s): <span>/</span><br>
                    Switch Weapon: <span>P</span> (Hunter Only)
                </div>
            </div>
        </div>

        <button class="btn-start" id="btn-start">Fight!</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1>Duel Ended</h1>
        <div id="winner-text">Player 1 Wins!</div>
        <button class="btn-start" id="btn-restart">Main Menu</button>
    </div>
</div>

<script>
    /**
     * Otokojuku: Legends Duel
     * A 2D Canvas Platform Fighter
     */

// --- Constants & Game Data ---
    const CANVAS_W = 1000;
    const CANVAS_H = 600;
    const GRAVITY = 0.6;
    const GROUND_Y = 500;
    const PLATFORM = { x: 300, y: 320, w: 400, h: 20 };
    const SUPER_COOLDOWN = 45000; // 45 seconds

    const HEROES = {
        Hason: {
            name: "Hason", desc: "Cowboy with Colt Revolver & Dynamite",
            color: "#8B4513", maxHp: 200, speed: 5, jump: 15, width: 40, height: 70
        },
        Hunter: {
            name: "Hunter", desc: "Pirate with Musket & Great Sword",
            color: "#008080", maxHp: 220, speed: 4.5, jump: 14, width: 45, height: 70
        },
        Macu: {
            name: "Macu", desc: "Ainu Warrior with Long Spear & Poison",
            color: "#2E8B57", maxHp: 250, speed: 4, jump: 14, width: 40, height: 75
        },
        Willi: {
            name: "Willi", desc: "Ninja with Throwing Knives & Invisibility",
            color: "#2F4F4F", maxHp: 180, speed: 6.5, jump: 16, width: 35, height: 65
        },
        Artu: {
            name: "Artu", desc: "Daimyo with Great Armor & Ashigaru Summons",
            color: "#8B0000", maxHp: 300, speed: 3.5, jump: 13, width: 50, height: 75
        }
    };

    // --- Input Management ---
    const keys = {};
    const keysPressed = {}; // Edge triggers
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (!e.repeat) keysPressed[e.code] = true;
    });
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
    });

    // --- Utility Functions ---
    function checkAABB(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
            r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
    }

    // --- Game Engine Classes ---
    class Entity {
        constructor(x, y, w, h) {
            this.x = x; this.y = y; this.w = w; this.h = h;
            this.vx = 0; this.vy = 0;
            this.dead = false;
        }
        update(dt) {}
        draw(ctx) {}
    }

    class Particle extends Entity {
        constructor(x, y, color, vx, vy, life) {
            super(x, y, 4, 4);
            this.color = color;
            this.vx = vx; this.vy = vy;
            this.life = life; this.maxLife = life;
        }
        update(dt) {
            this.x += this.vx; this.y += this.vy;
            this.vy += GRAVITY * 0.5;
            this.life -= dt;
            if (this.life <= 0) this.dead = true;
        }
        draw(ctx) {
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.globalAlpha = 1.0;
        }
    }

    class Projectile extends Entity {
        constructor(x, y, w, h, vx, vy, damage, owner, color, type="normal") {
            super(x, y, w, h);
            this.vx = vx; this.vy = vy;
            this.damage = damage; this.owner = owner;
            this.color = color; this.type = type; // normal, dynamite, etc.
            this.timer = 0;
        }
        update(dt) {
            this.x += this.vx; this.y += this.vy;

            if (this.type === "dynamite") {
                this.vy += GRAVITY;
                if (this.y + this.h >= GROUND_Y) {
                    this.y = GROUND_Y - this.h;
                    this.vx *= 0.8; // friction
                    this.vy = 0;
                }
                this.timer += dt;
                if (this.timer >= 1500) { // Explode
                    this.dead = true;
                    game.createExplosion(this.x + this.w/2, this.y + this.h/2, 120, 80, this.owner);
                }
            } else if (this.type === "knife") {
                this.vy += GRAVITY * 0.1; // slight drop
            }

            // Standard bullet out of bounds
            if (this.x < -100 || this.x > CANVAS_W + 100 || this.y > CANVAS_H || this.y < -100) {
                this.dead = true;
            }

            // Collision with enemy player or minions (if normal projectile)
            if (!this.dead && this.type !== "dynamite") {
                let targets = [game.getEnemyOf(this.owner), ...game.minions.filter(m => m.owner !== this.owner)];
                for (let t of targets) {
                    if (!t.dead && checkAABB(this, t)) {
                        t.takeDamage(this.damage, this.owner);
                        this.dead = true;
                        for(let i=0; i<5; i++) game.particles.push(new Particle(this.x, this.y, this.color, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 300));
                        break;
                    }
                }
            }
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            if (this.type === "dynamite") {
                ctx.fillStyle = "#ff3333";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                // fuse
                ctx.fillStyle = "#ffff00";
                ctx.fillRect(this.x + this.w/2, this.y - 5, 2, 5);
            } else if (this.type === "knife") {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.vx > 0 ? this.timer*0.02 : -this.timer*0.02);
                ctx.fillStyle = "#ddd";
                ctx.beginPath();
                ctx.moveTo(-10, -2); ctx.lineTo(10, 0); ctx.lineTo(-10, 2); ctx.fill();
                ctx.restore();
                this.timer += 16;
            } else {
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
        }
    }

    class Minion extends Entity {
        constructor(owner, x, y) {
            super(x, y, 20, 40);
            this.owner = owner;
            this.hp = owner.maxHp * 0.1;
            this.maxHp = this.hp;
            this.shootTimer = Math.random() * 1000; // staggered shooting
            this.color = "#777";
        }
        takeDamage(amt, attacker) {
            this.hp -= amt;
            if (this.hp <= 0) {
                this.dead = true;
                for(let i=0; i<10; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ff0000", (Math.random()-0.5)*10, Math.random()*-10, 500));
            }
        }
        update(dt) {
            // Gravity
            this.vy += GRAVITY;
            this.y += this.vy;

            // Ground Collision
            if (this.y + this.h >= GROUND_Y) {
                this.y = GROUND_Y - this.h;
                this.vy = 0;
            }
            // Platform Collision
            if (this.vy > 0 && this.y + this.h - this.vy <= PLATFORM.y && this.y + this.h >= PLATFORM.y) {
                if (this.x + this.w > PLATFORM.x && this.x < PLATFORM.x + PLATFORM.w) {
                    this.y = PLATFORM.y - this.h;
                    this.vy = 0;
                }
            }

            // Aim and shoot
            let enemy = game.getEnemyOf(this.owner);
            if (enemy && !enemy.dead) {
                this.shootTimer += dt;
                if (this.shootTimer >= 3000) {
                    this.shootTimer = 0;
                    // Calculate trajectory
                    let cx = this.x + this.w/2; let cy = this.y + 10;
                    let ex = enemy.x + enemy.w/2; let ey = enemy.y + enemy.h/2;
                    let angle = Math.atan2(ey - cy, ex - cx);
                    let speed = 12;
                    game.projectiles.push(new Projectile(cx, cy, 6, 6, Math.cos(angle)*speed, Math.sin(angle)*speed, 10, this.owner, "#222"));
                    // Muzzle flash
                    game.particles.push(new Particle(cx + Math.cos(angle)*15, cy + Math.sin(angle)*15, "#FFA500", 0, 0, 100));
                }
            }
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.w, this.h);
            // Musket stick
            let enemy = game.getEnemyOf(this.owner);
            let dir = (enemy && enemy.x < this.x) ? -1 : 1;
            ctx.fillStyle = "#333";
            ctx.fillRect(this.x + (dir>0?10:-20), this.y + 10, 30, 4);

            // HP bar
            ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 8, this.w, 4);
            ctx.fillStyle = "green"; ctx.fillRect(this.x, this.y - 8, this.w * (this.hp/this.maxHp), 4);
        }
    }

    class Hurricane extends Entity {
        constructor(owner) {
            super(CANVAS_W/2 - 50, GROUND_Y - 300, 100, 300);
            this.owner = owner;
            this.timer = 15000; // 15 seconds
            this.tickTimer = 0;
        }
        update(dt) {
            this.timer -= dt;
            if (this.timer <= 0) this.dead = true;

            this.tickTimer += dt;
            if (this.tickTimer >= 200) { // damage every 0.2s
                this.tickTimer = 0;
                let enemy = game.getEnemyOf(this.owner);
                if (checkAABB(this, enemy)) {
                    enemy.takeDamage(3, this.owner);
                    // Apply slow is handled in Player update
                }
            }

            // Visual spin
            if(Math.random() < 0.3) {
                game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#aaddff", (Math.random()-0.5)*4, -Math.random()*5, 400));
            }
        }
        draw(ctx) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = "#88ccff";
            // Draw tornado shape loosely
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.w, this.y);
            ctx.lineTo(this.x + this.w/2 + 20, this.y + this.h);
            ctx.lineTo(this.x + this.w/2 - 20, this.y + this.h);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    class Fighter extends Entity {
        constructor(id, heroName, x, controls, isP1) {
            let stats = HEROES[heroName];
            super(x, GROUND_Y - stats.height, stats.width, stats.height);
            this.id = id;
            this.heroName = heroName;
            this.controls = controls;
            this.isP1 = isP1;
            this.facing = isP1 ? 1 : -1;

            this.baseMaxHp = stats.maxHp;
            this.maxHp = stats.maxHp;
            this.hp = this.maxHp;
            this.baseSpeed = stats.speed;
            this.baseJump = stats.jump;
            this.color = stats.color;

            this.isGrounded = false;

            this.superCooldown = 0;
            this.attackTimer = 0;
            this.meleeActive = 0; // Duration hitbox is active
            this.stunTimer = 0;

            // Character specific states
            this.buffs = { poison: 0, battleCry: 0, shade: 0, hurricaneSlow: false };
            this.hasonAmmo = 6; this.hasonRecharge = 0;
            this.hunterWeapon = 'musket'; // 'musket' or 'sword'
            this.hunterMusketCD = 0;
        }

        takeDamage(amt, attacker) {
            if (this.dead) return;

            // Artu damage reduction
            if (this.heroName === 'Artu') amt *= 0.9;
            // Macu battlecry buff on attacker
            if (attacker && attacker.buffs && attacker.buffs.battleCry > 0) amt *= 1.5;

            this.hp -= amt;
            this.stunTimer = 150; // brief hit stun

            // Blood particles
            for(let i=0; i<5; i++) {
                game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ff0000", (Math.random()-0.5)*8, (Math.random()-0.5)*8, 200));
            }

            if (this.hp <= 0) {
                this.hp = 0;
                this.dead = true;
                game.endGame(this.isP1 ? "Player 2" : "Player 1");
            }
        }

        update(dt) {
            if (this.dead) return;

            // Apply Buffs/Debuffs
            let currentSpeed = this.baseSpeed;
            let currentJump = this.baseJump;

            if (this.buffs.poison > 0) {
                this.buffs.poison -= dt;
                currentSpeed *= 0.6; // slow
                if (Math.floor(this.buffs.poison/1000) !== Math.floor((this.buffs.poison+dt)/1000)) {
                    this.takeDamage(2, null); // 2 dmg per sec
                }
                if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y, "#00ff00", 0, -2, 300));
            }
            if (this.buffs.battleCry > 0) {
                this.buffs.battleCry -= dt;
                if(Math.random()<0.1) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ff4500", 0, -3, 300));
            }
            if (this.buffs.shade > 0) {
                this.buffs.shade -= dt;
            }
            this.buffs.hurricaneSlow = false;
            if (game.hurricane && !game.hurricane.dead && game.hurricane.owner !== this) {
                if (checkAABB(this, game.hurricane)) {
                    this.buffs.hurricaneSlow = true;
                    currentSpeed *= 0.4;
                }
            }

            // Timers
            if (this.superCooldown > 0) this.superCooldown -= dt;
            if (this.attackTimer > 0) this.attackTimer -= dt;
            if (this.meleeActive > 0) this.meleeActive -= dt;
            if (this.stunTimer > 0) this.stunTimer -= dt;
            if (this.hunterMusketCD > 0) this.hunterMusketCD -= dt;

            // Hason Ammo Recharge
            if (this.heroName === 'Hason' && this.hasonAmmo < 6) {
                this.hasonRecharge += dt;
                let rechargeTime = this.hasonAmmo === 0 ? 2000 : 800; // longer if empty
                if (this.hasonRecharge >= rechargeTime) {
                    this.hasonAmmo++;
                    this.hasonRecharge = 0;
                }
            }

            // --- Movement ---
            if (this.stunTimer <= 0) {
                if (keys[this.controls.left]) {
                    this.vx = -currentSpeed;
                    this.facing = -1;
                } else if (keys[this.controls.right]) {
                    this.vx = currentSpeed;
                    this.facing = 1;
                } else {
                    this.vx = 0;
                }

                if (keysPressed[this.controls.jump] && this.isGrounded) {
                    this.vy = -currentJump;
                    this.isGrounded = false;
                    game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ccc", -2, 0, 200));
                    game.particles.push(new Particle(this.x+this.w/2, this.y+this.h, "#ccc", 2, 0, 200));
                }

                // --- Actions ---
                if (keysPressed[this.controls.switch] && this.heroName === 'Hunter') {
                    this.hunterWeapon = this.hunterWeapon === 'musket' ? 'sword' : 'musket';
                }

                if (keysPressed[this.controls.attack] && this.attackTimer <= 0) {
                    this.performAttack();
                }

                if (keysPressed[this.controls.super] && this.superCooldown <= 0) {
                    this.performSuper();
                }
            } else {
                this.vx = 0; // Stunned
            }

            // --- Physics ---
            this.vy += GRAVITY;
            this.x += this.vx;
            this.y += this.vy;

            // Screen bounds
            if (this.x < 0) this.x = 0;
            if (this.x + this.w > CANVAS_W) this.x = CANVAS_W - this.w;

            this.isGrounded = false;

            // Ground collision
            if (this.y + this.h >= GROUND_Y) {
                this.y = GROUND_Y - this.h;
                this.vy = 0;
                this.isGrounded = true;
            }

            // Platform collision (only when falling)
            if (this.vy > 0 && this.y + this.h - this.vy <= PLATFORM.y && this.y + this.h >= PLATFORM.y) {
                if (this.x + this.w > PLATFORM.x && this.x < PLATFORM.x + PLATFORM.w) {
                    // allow falling through if holding down (S or DownArrow) - common platformer mechanic
                    let dropKey = this.isP1 ? 'KeyS' : 'ArrowDown';
                    if (!keys[dropKey]) {
                        this.y = PLATFORM.y - this.h;
                        this.vy = 0;
                        this.isGrounded = true;
                    }
                }
            }

            // Melee logic collision
            if (this.meleeActive > 0) {
                let hitBox = this.getMeleeHitbox();
                let enemy = game.getEnemyOf(this);
                if (!enemy.dead && enemy.stunTimer <= 0 && checkAABB(hitBox, enemy)) {
                    let dmg = this.getMeleeDamage();
                    enemy.takeDamage(dmg, this);
                    if (this.heroName === 'Macu' && this.buffs.battleCry > 0) {
                        enemy.buffs.poison = 30000; // Apply poison
                    }
                    this.meleeActive = 0; // only hit once per swing
                }
            }
        }

        getMeleeHitbox() {
            let range = 50; let yOffset = 10; let h = 40;
            if (this.heroName === 'Macu') range = 100; // Long spear
            if (this.heroName === 'Hunter' && this.hunterWeapon === 'sword') range = 70; // Great sword

            return {
                x: this.facing === 1 ? this.x + this.w : this.x - range,
                y: this.y + yOffset,
                w: range,
                h: h
            };
        }

        getMeleeDamage() {
            if (this.heroName === 'Artu') return 18;
            if (this.heroName === 'Macu') return 15;
            if (this.heroName === 'Hunter') return 25; // Slow great sword
            return 10;
        }

        performAttack() {
            let px = this.facing === 1 ? this.x + this.w : this.x - 10;
            let py = this.y + 25;

            if (this.heroName === 'Hason') {
                if (this.hasonAmmo > 0) {
                    this.hasonAmmo--;
                    this.hasonRecharge = 0;
                    game.projectiles.push(new Projectile(px, py, 10, 5, this.facing * 20, 0, 15, this, "#FFD700"));
                    this.attackTimer = 300;
                    // Muzzle flash
                    game.particles.push(new Particle(px, py, "#FFA500", this.facing*2, 0, 100));
                } else {
                    // Click sound / visual (empty)
                    this.attackTimer = 200;
                }
            }
            else if (this.heroName === 'Willi') {
                game.projectiles.push(new Projectile(px, py, 20, 4, this.facing * 18, 0, 12, this, "#ccc", "knife"));
                this.attackTimer = 400;
            }
            else if (this.heroName === 'Hunter' && this.hunterWeapon === 'musket') {
                if (this.hunterMusketCD <= 0) {
                    game.projectiles.push(new Projectile(px, py, 12, 12, this.facing * 25, 0, 35, this, "#222"));
                    this.hunterMusketCD = 6000; // 6s reload
                    this.attackTimer = 500;
                    game.particles.push(new Particle(px, py, "#FFA500", this.facing*5, -2, 150));
                }
            }
            else {
                // Melee
                this.meleeActive = 150;
                this.attackTimer = this.heroName === 'Hunter' ? 800 : (this.heroName === 'Macu' ? 600 : 500);
            }
        }

        performSuper() {
            this.superCooldown = SUPER_COOLDOWN;

            // Super effect visuals
            for(let i=0; i<20; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#ffeb3b", (Math.random()-0.5)*10, (Math.random()-0.5)*10, 600));

            if (this.heroName === 'Hason') {
                game.projectiles.push(new Projectile(this.x+this.w/2, this.y, 16, 16, this.facing * 12, -8, 0, this, "", "dynamite"));
            }
            else if (this.heroName === 'Hunter') {
                this.maxHp += 50;
                this.hp += 50;
                this.baseJump = 18;
                game.hurricane = new Hurricane(this);
            }
            else if (this.heroName === 'Macu') {
                this.buffs.battleCry = 30000; // 30s
            }
            else if (this.heroName === 'Willi') {
                this.buffs.shade = 20000; // 20s
            }
            else if (this.heroName === 'Artu') {
                for (let i = 0; i < 5; i++) {
                    let mx = this.x + (Math.random() * 100 - 50);
                    game.minions.push(new Minion(this, mx, this.y - 50));
                }
            }
        }

        draw(ctx) {
            if (this.buffs.shade > 0) ctx.globalAlpha = 0.15; // Invisible Willi

            ctx.save();
            // Translate to top-center of the character for easier drawing
            ctx.translate(this.x + this.w / 2, this.y);

            // Flip canvas horizontally if facing left
            if (this.facing === -1) {
                ctx.scale(-1, 1);
            }

            let hw = this.w / 2; // half width
            let h = this.h;      // full height

            // Draw character shadow/outline
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fillRect(-hw - 2, -2, this.w + 4, h + 4);

            // Draw base character body
            ctx.fillStyle = this.color;
            ctx.fillRect(-hw, 0, this.w, h);

            // Draw facing indicator (Eye/Visor)
            ctx.fillStyle = "#fff";
            ctx.fillRect(hw - 12, 10, 8, 8); // Eye is always drawn on the right because of scale

            // Character Specifics - Highly detailed Hero Forms
            if (this.heroName === 'Hason') {
                // Cowboy Hat
                ctx.fillStyle = "#3e1f0a";
                ctx.fillRect(-hw - 12, -5, this.w + 24, 8); // Wide brim
                ctx.fillRect(-hw + 4, -20, this.w - 8, 15); // Crown
                // Poncho
                ctx.fillStyle = "#a0522d";
                ctx.beginPath();
                ctx.moveTo(-hw, 15); ctx.lineTo(hw, 15); ctx.lineTo(hw + 6, 45); ctx.lineTo(-hw - 6, 45);
                ctx.fill();
                // Belt
                ctx.fillStyle = "#222"; ctx.fillRect(-hw, h - 25, this.w, 8);
                ctx.fillStyle = "gold"; ctx.fillRect(-4, h - 26, 8, 10);
            }
            else if (this.heroName === 'Artu') {
                // Samurai Kabuto (Helmet) Horns
                ctx.fillStyle = "#d4af37";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-18, -22); ctx.lineTo(4, -5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(25, -22); ctx.lineTo(12, -5); ctx.fill();
                // Face Plate Mask
                ctx.fillStyle = "#600000";
                ctx.fillRect(-hw, 15, this.w, 14);
                // Sode (Shoulder Armor Pads)
                ctx.fillStyle = "#b8860b";
                ctx.fillRect(-hw - 6, 18, 10, 22);
                ctx.fillRect(hw - 4, 18, 10, 22);
                // Armor Slats
                ctx.fillStyle = "#333";
                ctx.fillRect(-hw, 35, this.w, 4);
                ctx.fillRect(-hw, 45, this.w, 4);
                ctx.fillRect(-hw, 55, this.w, 4);
            }
            else if (this.heroName === 'Macu') {
                // Ainu Headband
                ctx.fillStyle = "#a12222";
                ctx.fillRect(-hw, 6, this.w, 8);
                // Tribal Body Markings
                ctx.fillStyle = "#fff";
                ctx.fillRect(-hw + 6, 25, this.w - 12, 4);
                ctx.fillRect(-hw + 4, 40, this.w - 8, 4);
                ctx.fillRect(-hw + 6, 55, this.w - 12, 4);
            }
            else if (this.heroName === 'Hunter') {
                // Pirate Bandana
                ctx.fillStyle = "#cc0000";
                ctx.fillRect(-hw, -5, this.w, 12);
                ctx.beginPath(); ctx.moveTo(-hw, -5); ctx.lineTo(-hw - 15, 10); ctx.lineTo(-hw, 5); ctx.fill(); // Bandana tail
                // Eyepatch
                ctx.fillStyle = "#111";
                ctx.fillRect(hw - 14, 8, 12, 10);
                ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-hw, 0); ctx.lineTo(hw, 15); ctx.stroke();
                // Belt and Sash
                ctx.fillStyle = "#cc0000";
                ctx.fillRect(-hw, h - 25, this.w, 12);
                ctx.fillStyle = "#222";
                ctx.fillRect(-hw, h - 22, this.w, 6);
            }
            else if (this.heroName === 'Willi') {
                // Ninja Scarf / Mask
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(-hw, 0, this.w, h); // Full dark suit
                // Skin slit for eyes
                ctx.fillStyle = "#ffe0bd";
                ctx.fillRect(-hw + 4, 10, this.w - 8, 8);
                // Red Scarf and trailing ribbons
                ctx.fillStyle = "#800000";
                ctx.fillRect(-hw, 20, this.w, 8);
                ctx.beginPath(); ctx.moveTo(-hw + 5, 25); ctx.lineTo(-hw - 20, 15); ctx.lineTo(-hw - 15, 30); ctx.fill();
                // Ninja eye
                ctx.fillStyle = "#fff"; ctx.fillRect(hw - 10, 12, 6, 4);
            }

            // Weapon Draw
            ctx.fillStyle = "#aaa";

            if (this.heroName === 'Hason') {
                // Revolver
                ctx.fillRect(hw, 25, 22, 6); // Barrel
                ctx.fillRect(hw, 25, 6, 14); // Grip
            }
            else if (this.heroName === 'Hunter') {
                if (this.hunterWeapon === 'musket') {
                    // Musket
                    ctx.fillStyle = "#5c2e0e"; // Wood stock
                    ctx.fillRect(hw - 25, 25, 50, 8);
                    ctx.fillStyle = "#222"; // Long barrel
                    ctx.fillRect(hw + 10, 23, 35, 5);
                } else {
                    // Great Sword (Resting on shoulder)
                    ctx.fillStyle = "#d3d3d3";
                    ctx.fillRect(hw - 8, -25, 16, 75); // Huge blade
                    ctx.fillStyle = "#8b4513";
                    ctx.fillRect(hw - 6, 50, 12, 20); // Hilt
                    ctx.fillStyle = "#ffd700";
                    ctx.fillRect(hw - 12, 46, 24, 4); // Crossguard
                }
            }
            else if (this.heroName === 'Macu') {
                // Long Spear
                ctx.fillStyle = "#8B4513"; // Wood shaft
                ctx.fillRect(hw - 6, -45, 6, 120);
                ctx.fillStyle = "#ddd"; // Metal tip
                ctx.beginPath(); ctx.moveTo(hw - 3, -45); ctx.lineTo(hw - 9, -70); ctx.lineTo(hw + 3, -70); ctx.fill();
            }
            else if (this.heroName === 'Artu') {
                // Katana (Sheathed or idle at side)
                ctx.fillStyle = "#222";
                ctx.fillRect(hw - 6, 30, 8, 50); // Saya (scabbard)
                ctx.fillStyle = "#d4af37";
                ctx.fillRect(hw - 10, 30, 16, 4); // Tsuba (guard)
            }

            ctx.restore(); // Restore context back to absolute positioning for absolute hitboxes

            // Melee Attack Animation (Drawn using absolute game coordinates)
            if (this.meleeActive > 0) {
                let hb = this.getMeleeHitbox();
                ctx.fillStyle = "rgba(255, 255, 255, 0.7)";

                if (this.heroName === 'Hunter' && this.hunterWeapon === 'sword') {
                    // Large sweeping sword arc effect
                    ctx.beginPath();
                    ctx.arc(this.x + this.w/2, this.y + 30, 75,
                        this.facing === 1 ? -Math.PI/3 : Math.PI,
                        this.facing === 1 ? Math.PI/3 : Math.PI + Math.PI/3);
                    ctx.lineWidth = 18;
                    ctx.strokeStyle = "rgba(100, 200, 255, 0.8)";
                    ctx.stroke();
                }
                else if (this.heroName === 'Macu') {
                    // Powerful straight thrust effect
                    ctx.fillStyle = "rgba(200, 255, 200, 0.9)";
                    hb.h = 10; hb.y += 15;
                    ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
                }
                else {
                    // Standard melee swipe
                    ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
                }
            }

            ctx.globalAlpha = 1.0;

            // Status indicator visuals
            if (this.buffs.poison > 0) {
                ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
        }
    }

    // --- Main Game Engine ---
    class Game {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.lastTime = 0;
            this.state = 'MENU'; // MENU, PLAYING, GAMEOVER

            this.p1Choice = 'Hason';
            this.p2Choice = 'Artu';

            this.setupMenu();
        }

        setupMenu() {
            const p1Roster = document.getElementById('p1-roster');
            const p2Roster = document.getElementById('p2-roster');

            Object.keys(HEROES).forEach(key => {
                // P1 Buttons
                let b1 = document.createElement('button');
                b1.className = `hero-btn ${key === this.p1Choice ? 'selected' : ''}`;
                b1.innerText = `${HEROES[key].name} - ${HEROES[key].desc}`;
                b1.onclick = () => {
                    this.p1Choice = key;
                    Array.from(p1Roster.children).forEach(c => c.classList.remove('selected'));
                    b1.classList.add('selected');
                };
                p1Roster.appendChild(b1);

                // P2 Buttons
                let b2 = document.createElement('button');
                b2.className = `hero-btn ${key === this.p2Choice ? 'selected' : ''}`;
                b2.innerText = `${HEROES[key].name} - ${HEROES[key].desc}`;
                b2.onclick = () => {
                    this.p2Choice = key;
                    Array.from(p2Roster.children).forEach(c => c.classList.remove('selected'));
                    b2.classList.add('selected');
                };
                p2Roster.appendChild(b2);
            });

            document.getElementById('btn-start').onclick = () => this.startGame();
            document.getElementById('btn-restart').onclick = () => {
                document.getElementById('game-over-screen').classList.add('hidden');
                document.getElementById('menu-screen').classList.remove('hidden');
                this.state = 'MENU';
            };
        }

        startGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');

            let p1Ctrl = { left: 'KeyA', right: 'KeyD', jump: 'KeyW', attack: 'Space', super: 'KeyE', switch: 'KeyT' };
            let p2Ctrl = { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', attack: 'ControlRight', super: 'Slash', switch: 'KeyP' };

            this.p1 = new Fighter('p1', this.p1Choice, 100, p1Ctrl, true);
            this.p2 = new Fighter('p2', this.p2Choice, 800, p2Ctrl, false);
            this.p2.facing = -1;

            this.projectiles = [];
            this.particles = [];
            this.minions = [];
            this.hurricane = null;

            // UI Setup
            document.getElementById('p1-name').innerText = `P1: ${HEROES[this.p1Choice].name}`;
            document.getElementById('p2-name').innerText = `P2: ${HEROES[this.p2Choice].name}`;

            this.state = 'PLAYING';
            this.lastTime = performance.now();
            requestAnimationFrame(t => this.loop(t));
        }

        getEnemyOf(fighter) {
            return fighter === this.p1 ? this.p2 : this.p1;
        }

        createExplosion(x, y, radius, damage, owner) {
            // Visual
            for(let i=0; i<30; i++) {
                this.particles.push(new Particle(x, y, i%2===0 ? "#ff5500" : "#555", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 600));
            }

            // Damage players and minions
            let targets = [this.p1, this.p2, ...this.minions];
            for (let t of targets) {
                if (!t.dead) {
                    // simple distance check
                    let cx = t.x + t.w/2; let cy = t.y + t.h/2;
                    let dist = Math.hypot(cx - x, cy - y);
                    if (dist <= radius) {
                        t.takeDamage(damage, owner);
                    }
                }
            }
        }

        updateUI() {
            // P1 UI
            document.getElementById('p1-hp').style.width = `${Math.max(0, (this.p1.hp / this.p1.maxHp) * 100)}%`;
            let p1Sup = 100 - (this.p1.superCooldown / SUPER_COOLDOWN) * 100;
            let p1Bar = document.getElementById('p1-super');
            p1Bar.style.width = `${p1Sup}%`;
            if (p1Sup >= 100) p1Bar.classList.add('ready'); else p1Bar.classList.remove('ready');

            let p1Stat = "";
            if (this.p1.heroName === 'Hason') p1Stat = `Ammo: ${this.p1.hasonAmmo}/6`;
            if (this.p1.heroName === 'Hunter') p1Stat = `Wep: ${this.p1.hunterWeapon.toUpperCase()} ${this.p1.hunterMusketCD>0 ? '(Rld)' : ''}`;
            if (this.p1.buffs.poison > 0) p1Stat += " [POISONED]";
            document.getElementById('p1-status').innerText = p1Stat;

            // P2 UI
            document.getElementById('p2-hp').style.width = `${Math.max(0, (this.p2.hp / this.p2.maxHp) * 100)}%`;
            let p2Sup = 100 - (this.p2.superCooldown / SUPER_COOLDOWN) * 100;
            let p2Bar = document.getElementById('p2-super');
            p2Bar.style.width = `${p2Sup}%`;
            if (p2Sup >= 100) p2Bar.classList.add('ready'); else p2Bar.classList.remove('ready');

            let p2Stat = "";
            if (this.p2.heroName === 'Hason') p2Stat = `Ammo: ${this.p2.hasonAmmo}/6`;
            if (this.p2.heroName === 'Hunter') p2Stat = `Wep: ${this.p2.hunterWeapon.toUpperCase()} ${this.p2.hunterMusketCD>0 ? '(Rld)' : ''}`;
            if (this.p2.buffs.poison > 0) p2Stat += " [POISONED]";
            document.getElementById('p2-status').innerText = p2Stat;
        }

        endGame(winnerText) {
            if (this.state === 'GAMEOVER') return;
            this.state = 'GAMEOVER';
            setTimeout(() => {
                document.getElementById('game-ui').classList.add('hidden');
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('winner-text').innerText = `${winnerText} Wins!`;
            }, 1500); // Dramatic pause
        }

        loop(timestamp) {
            if (this.state !== 'PLAYING' && this.state !== 'GAMEOVER') return;

            let dt = timestamp - this.lastTime;
            this.lastTime = timestamp;
            if (dt > 100) dt = 16; // Prevent massive jumps if tab inactive

            this.update(dt);
            this.draw();

            // Clear edge trigger inputs
            for (let k in keysPressed) delete keysPressed[k];

            requestAnimationFrame(t => this.loop(t));
        }

        update(dt) {
            this.p1.update(dt);
            this.p2.update(dt);

            if (this.hurricane && !this.hurricane.dead) this.hurricane.update(dt);

            this.minions.forEach(m => m.update(dt));
            this.projectiles.forEach(p => p.update(dt));
            this.particles.forEach(p => p.update(dt));

            // Cleanup dead entities
            this.minions = this.minions.filter(m => !m.dead);
            this.projectiles = this.projectiles.filter(p => !p.dead);
            this.particles = this.particles.filter(p => !p.dead);

            if (this.state === 'PLAYING') this.updateUI();
        }

        draw() {
            // Clear background
            this.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

            // Draw Environment
            this.ctx.fillStyle = "#111820";
            this.ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);
            this.ctx.fillStyle = "#4caf50"; // Grass line
            this.ctx.fillRect(0, GROUND_Y, CANVAS_W, 5);

            // Platform
            this.ctx.fillStyle = "#5c4033"; // Wood
            this.ctx.fillRect(PLATFORM.x, PLATFORM.y, PLATFORM.w, PLATFORM.h);
            this.ctx.fillStyle = "#3e2723";
            this.ctx.fillRect(PLATFORM.x, PLATFORM.y + PLATFORM.h, PLATFORM.w, 10); // shadow

            // Draw Entities
            if (this.hurricane && !this.hurricane.dead) this.hurricane.draw(this.ctx);

            this.minions.forEach(m => m.draw(this.ctx));

            if (!this.p1.dead) this.p1.draw(this.ctx);
            if (!this.p2.dead) this.p2.draw(this.ctx);

            this.projectiles.forEach(p => p.draw(this.ctx));
            this.particles.forEach(p => p.draw(this.ctx));
        }
    }

    // Initialize Game Engine
    const game = new Game();

</script>
</body>
