<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otokojuku: Legends Duel - Twin Spire Arena</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg-dark: #0a0a0f;
            --ui-bg: rgba(10, 10, 15, 0.9);
            --text-main: #f1f3f5;
            --accent: #ff0055;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2) inset;
            background: linear-gradient(to bottom, #0d1117 0%, #05070a 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .hidden { display: none !important; }

        h1 {
            color: var(--primary);
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        h2 { margin-bottom: 30px; font-weight: 300; color: #aaa; letter-spacing: 2px;}

        .menu-content { display: flex; gap: 40px; align-items: flex-start; }
        .selection-container { display: flex; gap: 20px; }

        .player-select {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .player-select h3 { margin-top: 0; text-align: center; color: var(--accent); }

        .hero-btn {
            display: block; width: 100%; padding: 12px; margin: 6px 0;
            background: #1a1a24; color: white; border: 1px solid #333;
            cursor: pointer; transition: all 0.2s; text-align: left; border-radius: 6px;
            font-weight: 600;
        }
        .hero-btn:hover { background: #2a2a35; transform: translateX(5px); }
        .hero-btn.selected {
            background: linear-gradient(90deg, #005566 0%, #002233 100%);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .hero-info-panel {
            background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(10,10,15,0.95));
            padding: 25px; border-radius: 12px; border: 1px solid var(--primary);
            width: 350px; height: 420px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
            color: #eee; overflow-y: auto;
        }
        .hero-info-panel h3 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 0; font-size: 1.5rem;}
        .info-stat { font-weight: bold; color: #fff; margin-top: 10px;}
        .info-desc { font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; color: #bbb;}
        .skill-tag { background: rgba(0, 229, 255, 0.15); padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: #0ff; border: 1px solid #0ff;}

        .controls-info { font-size: 0.85rem; color: #888; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 6px; }
        .controls-info span { color: #ddd; font-weight: bold; }

        .btn-row { display: flex; gap: 20px; margin-top: 30px; }
        .btn-start, .btn-settings {
            padding: 15px 35px; font-size: 1.1rem; color: white; border: none; border-radius: 6px;
            cursor: pointer; text-transform: uppercase; font-weight: bold; transition: all 0.2s;
        }
        .btn-start { background: linear-gradient(45deg, var(--accent), #cc0044); box-shadow: 0 4px 15px rgba(255,0,85,0.4); }
        .btn-settings { background: #333; }
        .btn-start:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,0,85,0.6); }
        .btn-settings:hover { background: #444; }

        #settings-screen { background: rgba(0,0,0,0.95); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 800px; }
        .keybind-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .key-btn { background: #222; border: 1px solid #555; color: #fff; padding: 6px 15px; border-radius: 4px; cursor: pointer; min-width: 100px; text-align: center; }
        .key-btn.listening { background: var(--primary); color: #000; font-weight: bold; animation: pulse 1s infinite; }

        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .hud-player { position: absolute; top: 20px; width: 350px; background: rgba(10,10,15,0.8); padding: 12px; border-radius: 8px; border: 1px solid #333; backdrop-filter: blur(4px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        #hud-p1 { left: 20px; border-left: 4px solid var(--primary); }
        #hud-p2 { right: 20px; text-align: right; border-right: 4px solid var(--accent); }

        .hud-name { font-weight: 800; font-size: 1.3rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .bar-container { width: 100%; height: 22px; background: #1a1a24; margin-bottom: 6px; border-radius: 4px; overflow: hidden; border: 1px solid #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);}
        .health-bar { height: 100%; background: linear-gradient(90deg, #2e7d32, #4caf50); transition: width 0.1s; }
        .horse-bar { height: 100%; background: #8B4513; transition: width 0.1s; }
        .super-bar { height: 100%; background: #2196f3; transition: width 0.1s; }
        .super-bar.ready { background: #ffeb3b; animation: pulse 0.8s infinite alternate; }

        @keyframes pulse { from { opacity: 0.8; filter: brightness(1); } to { opacity: 1; filter: brightness(1.5); box-shadow: 0 0 10px currentColor; } }

        .status-text { font-size: 0.9rem; color: #ffd54f; min-height: 18px; font-weight: bold; margin-top: 5px;}
        .prompt-text { position: absolute; color: #fff; font-weight: bold; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; font-size: 14px; text-align: center; width: 200px; transform: translateX(-50%); z-index: 6;}

        #game-over { text-align: center; }
        #winner-text { font-size: 4.5rem; color: var(--primary); margin-bottom: 20px; text-shadow: 0 0 30px rgba(0,229,255,0.6); font-style: italic; font-weight: 900;}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="game-ui" class="hidden">
        <div id="hud-p1" class="hud-player">
            <div class="hud-name" id="p1-name">P1 Name</div>
            <div class="bar-container"><div id="p1-hp" class="health-bar" style="width: 100%"></div></div>
            <div class="bar-container hidden" id="p1-horse-container"><div id="p1-horse-hp" class="horse-bar" style="width: 100%"></div></div>
            <div class="bar-container" style="height:12px;"><div id="p1-super" class="super-bar" style="width: 0%"></div></div>
            <div class="status-text" id="p1-status"></div>
        </div>
        <div id="hud-p2" class="hud-player">
            <div class="hud-name" id="p2-name">P2 Name</div>
            <div class="bar-container"><div id="p2-hp" class="health-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container hidden" id="p2-horse-container"><div id="p2-horse-hp" class="horse-bar" style="width: 100%; float: right;"></div></div>
            <div class="bar-container" style="height:12px;"><div id="p2-super" class="super-bar" style="width: 0%; float: right;"></div></div>
            <div class="status-text" id="p2-status"></div>
        </div>
        <div id="dynamic-prompts"></div>
    </div>

    <div id="menu-screen" class="screen">
        <h1>Otokojuku: Legends Duel</h1>
        <h2>Twin Spire Arena</h2>

        <div class="menu-content">
            <div class="selection-container">
                <div class="player-select">
                    <h3>Player 1</h3>
                    <div id="p1-roster"></div>
                    <div class="controls-info" id="p1-controls-display"></div>
                </div>
                <div class="player-select">
                    <h3>Player 2</h3>
                    <div id="p2-roster"></div>
                    <div class="controls-info" id="p2-controls-display"></div>
                </div>
            </div>

            <div class="hero-info-panel" id="hero-info-panel">
                <h3 id="info-name">Hover a Hero</h3>
                <div class="info-desc" id="info-desc">Select a hero to see their abilities.</div>
                <div id="info-details"></div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-start" id="btn-sp">1 Player (Vs CPU)</button>
            <button class="btn-start" id="btn-mp">2 Players (Local)</button>
            <button class="btn-settings" id="btn-open-settings">⚙ Settings</button>
        </div>
    </div>

    <div id="settings-screen" class="screen hidden">
        <h1 style="color: white;">Key Bindings</h1>
        <div class="settings-grid">
            <div class="player-select">
                <h3 style="color: var(--primary);">Player 1</h3>
                <div id="p1-bindings"></div>
            </div>
            <div class="player-select">
                <h3 style="color: var(--accent);">Player 2</h3>
                <div id="p2-bindings"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-settings" id="btn-reset-bindings">Reset Default</button>
            <button class="btn-start" id="btn-close-settings">Save & Close</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <div id="winner-text">Player 1 Wins!</div>
        <button class="btn-start" id="btn-restart" style="font-size: 1.2rem; padding: 10px 30px; margin-top: 10px;">Main Menu</button>
    </div>
</div>

<script>
    /**
     * Otokojuku: Legends Duel - Twin Spire Arena Edition
     */

    const DEFAULT_BINDS = {
        p1: { left: 'KeyA', right: 'KeyD', jump: 'KeyW', down: 'KeyS', attack: 'Space', super: 'KeyE', switch: 'KeyT' },
        p2: { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', down: 'ArrowDown', attack: 'Numpad9', super: 'NumpadEnter', switch: 'Numpad8' }
    };

    let currentBinds = JSON.parse(localStorage.getItem('otokojuku_binds')) || JSON.parse(JSON.stringify(DEFAULT_BINDS));

    function saveBinds() {
        localStorage.setItem('otokojuku_binds', JSON.stringify(currentBinds));
        updateControlsDisplay();
    }

    let listeningKey = null;

    window.addEventListener('keydown', e => {
        if (listeningKey) {
            e.preventDefault();
            currentBinds[listeningKey.player][listeningKey.action] = e.code;
            listeningKey.btn.innerText = formatKey(e.code);
            listeningKey.btn.classList.remove('listening');
            listeningKey = null;
            saveBinds();
        } else {
            keys[e.code] = true;
            if (!e.repeat) keysPressed[e.code] = true;
        }
    });
    window.addEventListener('keyup', e => {
        if (!listeningKey) keys[e.code] = false;
    });

    function formatKey(code) {
        if (!code) return 'UNBOUND';
        return code.replace('Key', '').replace('Arrow', '').replace('Numpad', 'Num ');
    }

    function updateControlsDisplay() {
        document.getElementById('p1-controls-display').innerHTML = `
        Move: <span>${formatKey(currentBinds.p1.left)}, ${formatKey(currentBinds.p1.down)}, ${formatKey(currentBinds.p1.right)}</span><br>
        Jump: <span>${formatKey(currentBinds.p1.jump)}</span><br>
        Attack: <span>${formatKey(currentBinds.p1.attack)}</span><br>
        Super: <span>${formatKey(currentBinds.p1.super)}</span><br>
        Switch/Misc: <span>${formatKey(currentBinds.p1.switch)}</span>
    `;
        document.getElementById('p2-controls-display').innerHTML = `
        Move: <span>${formatKey(currentBinds.p2.left)}, ${formatKey(currentBinds.p2.down)}, ${formatKey(currentBinds.p2.right)}</span><br>
        Jump: <span>${formatKey(currentBinds.p2.jump)}</span><br>
        Attack: <span>${formatKey(currentBinds.p2.attack)}</span><br>
        Super: <span>${formatKey(currentBinds.p2.super)}</span><br>
        Switch/Misc: <span>${formatKey(currentBinds.p2.switch)}</span>
    `;
    }

    function buildSettingsUI() {
        ['p1', 'p2'].forEach(p => {
            const container = document.getElementById(`${p}-bindings`);
            container.innerHTML = '';
            Object.keys(currentBinds[p]).forEach(action => {
                let row = document.createElement('div');
                row.className = 'keybind-row';
                row.innerHTML = `<span style="text-transform:capitalize">${action}:</span>`;
                let btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.innerText = formatKey(currentBinds[p][action]);
                btn.onclick = () => {
                    if (listeningKey) listeningKey.btn.classList.remove('listening');
                    listeningKey = { player: p, action: action, btn: btn };
                    btn.classList.add('listening');
                    btn.innerText = 'Press Any Key...';
                };
                row.appendChild(btn);
                container.appendChild(row);
            });
        });
    }

    // --- Constants & Game Data ---
    let CANVAS_W = window.innerWidth;
    let CANVAS_H = window.innerHeight;
    const GRAVITY = 0.6;

    let BOTTOM_Y = CANVAS_H - 40;
    let MAIN_Y = BOTTOM_Y - 160;
    let PLATFORMS = [];

    function updatePlatforms() {
        let cx = CANVAS_W / 2;
        BOTTOM_Y = CANVAS_H - 40;
        MAIN_Y = BOTTOM_Y - 160;
        let SIDE_HIGH_Y = MAIN_Y - 150;
        let CENTER_HIGH_Y = MAIN_Y - 250;

        PLATFORMS = [
            { x: -200, y: BOTTOM_Y, w: CANVAS_W + 400, h: 40, type: 'floor' },
            { x: cx - 450, y: MAIN_Y, w: 900, h: 20, type: 'main' },
            { x: cx - 550, y: SIDE_HIGH_Y, w: 150, h: 15, type: 'high' },
            { x: cx + 400, y: SIDE_HIGH_Y, w: 150, h: 15, type: 'high' },
            { x: cx - 100, y: CENTER_HIGH_Y, w: 200, h: 15, type: 'center_high' }
        ];
    }

        },

        },
        Kae: {

        },

    };

    class Entity {
        constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; this.vx = 0; this.vy = 0; this.dead = false; }
        update(dt) {} draw(ctx) {}
    }

    class Particle extends Entity {
        constructor(x, y, color, vx, vy, life, size=4) {
            super(x, y, size, size);
            this.color = color; this.vx = vx; this.vy = vy;
            this.life = life; this.maxLife = life;
        }
        update(dt) {
            this.x += this.vx; this.y += this.vy; this.vy += GRAVITY * 0.5;
            this.life -= dt; if (this.life <= 0) this.dead = true;
        }
        draw(ctx) {
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.globalAlpha = 1.0;
        }
    }

    class SwordShadow extends Entity {
        constructor(owner, x, y) {
            super(x, y, 40, 70);

                let targets = [game.p1, game.p2, ...game.minions, ...game.npcs].filter(t => t.id !== this.owner.id && t.owner !== this.owner && !t.dead && t.invincible <= 0);

                }

    class Hazard extends Entity {
        constructor(x, y, w, h, delay, duration, damage, owner, color) {

            this.duration = duration;
            this.damage = damage;
            this.owner = owner;
            this.color = color;
            this.hitTargets = new Set();
        }
        update(dt) {
            if (this.delay > 0) {
                this.delay -= dt;

            this.duration -= dt;
            if (this.duration <= 0) {
                this.dead = true;
                return;
            }
            let targets = [game.p1, game.p2, ...game.minions, ...game.npcs].filter(t => t.id !== this.owner.id && t.owner !== this.owner && !t.dead && t.invincible <= 0);

                    t.takeDamage(this.damage, this.owner);
                    this.hitTargets.add(t);
                }
            }
        }
        draw(ctx) {
            if (this.delay > 0) {
                ctx.fillStyle = "rgba(255,0,0,0.3)";
                ctx.fillRect(this.x, this.y + this.h - 5, this.w, 5);
            } else {
                ctx.fillStyle = this.color;
                for(let i=0; i<this.w; i+=15) {
                    ctx.beginPath();
                    ctx.moveTo(this.x+i, this.y+this.h);
                    ctx.lineTo(this.x+i+7.5, this.y);

                }

    class Projectile extends Entity {
        constructor(x, y, w, h, vx, vy, damage, owner, color, type="normal") {
            super(x, y, w, h);
            this.vx = vx; this.vy = vy; this.damage = damage; this.owner = owner;
            this.color = color; this.type = type; this.timer = 0;
            this.hitTargets = new Set();
        }
        update(dt) {
            this.x += this.vx; this.y += this.vy;

            if (this.type === "dynamite") {
                this.vy += GRAVITY;
                if (this.y + this.h >= BOTTOM_Y) { this.y = BOTTOM_Y - this.h; this.vx *= 0.8; this.vy = 0; }
                this.timer += dt;
                if (this.timer >= 1500) {
                    this.dead = true;
                    game.createExplosion(this.x + this.w/2, this.y + this.h/2, 120, 153, this.owner);
                }
            } else if (this.type === "homing_bullet" || this.type === "magic_burst" || this.type === "volt_laser") {
                let target = game.getEnemyOf(this.owner);
                let minDist = Math.hypot(target.x - this.x, target.y - this.y);
                for (let m of game.minions) {
                    if (m.owner !== this.owner && !m.dead) {
                        let d = Math.hypot(m.x - this.x, m.y - this.y);
                        if (d < minDist) { minDist = d; target = m; }
                    }
                }
                if (!target.dead && target.invincible <= 0) {
                    if (this.type !== "volt_laser" || this.timer < 1500) {
                        let tx = target.x + target.w/2; let ty = target.y + target.h/2;
                        let angle = Math.atan2(ty - (this.y + this.h/2), tx - (this.x + this.w/2));
                        let speed = this.type === "magic_burst" ? 18 : (this.type === "volt_laser" ? 15 : 25);
                        let turnSpeed = this.type === "magic_burst" ? 0.08 : (this.type === "volt_laser" ? 0.05 : 0.15);
                        this.vx += (Math.cos(angle) * speed - this.vx) * turnSpeed;
                        this.vy += (Math.sin(angle) * speed - this.vy) * turnSpeed;
                    }
                }
                this.timer += dt;
            } else if (this.type === "knife" || this.type === "large_knife" || this.type === "enhanced_knife" || this.type === "ki_blast" || this.type === "thrown_axe") {
                if (this.type !== "ki_blast" && this.type !== "thrown_axe") this.vy += GRAVITY * 0.1;
            }

            if (this.x < -100 || this.x > CANVAS_W + 100 || this.y > CANVAS_H || this.y < -100) this.dead = true;

            if (!this.dead && game.hurricane && !game.hurricane.dead && this.owner !== game.hurricane.owner) {
                if (checkAABB(this, game.hurricane)) {
                    this.dead = true;
                    for(let i=0; i<5; i++) game.particles.push(new Particle(this.x, this.y, "#aaddff", (Math.random()-0.5)*8, (Math.random()-0.5)*8, 200));
                    return;
                }
            }

            if (!this.dead && this.type !== "dynamite") {
                let targets = [game.getEnemyOf(this.owner), ...game.minions.filter(m => m.owner !== this.owner), ...game.npcs];
                for (let t of targets) {
                    if (!t.dead && t.invincible <= 0 && checkAABB(this, t) && !this.hitTargets.has(t)) {
                        let isBlocked = false;
                        if (t.attackState === 'active' && t.isMeleeAttack() && (t.heroName === 'Artu' || (t.heroName === 'Duke' && !t.isMounted))) {
                            if (Math.random() < 0.5) isBlocked = true;
                        }

                        if (isBlocked) {
                            for(let i=0; i<15; i++) game.particles.push(new Particle(this.x, this.y, "#ffffff", (Math.random()-0.5)*20, (Math.random()-0.5)*20, 300, 6));
                            for(let i=0; i<10; i++) game.particles.push(new Particle(this.x, this.y, "#ffd700", (Math.random()-0.5)*15, (Math.random()-0.5)*15, 400, 4));
                        } else {
                            let noKnockback = (this.type === "bullet" || this.type === "ki_blast" || this.type === "magic_burst" || this.type === "paper_plane" || this.type === "blue_paper_plane" || this.type === "fire_bolt" || this.type === "water_bolt" || this.type === "tidal_wave" || this.type === "volt_laser");
                            t.takeDamage(this.damage, this.owner, false, noKnockback);
                            if (t.type !== 'npc') {
                                if (this.type === "large_knife" || this.type === "enhanced_knife") t.buffs.slow = 5000;
                                if (this.type === "enhanced_knife") {
                                    let dir = this.vx > 0 ? 1 : -1;
                                    t.vx = dir * 30; // Knockback
                                    t.vy = -5;
                                }
                                if (this.type === "ki_blast") {
                                    t.buffs.dizzy = 750;
                                    let dir = this.vx > 0 ? 1 : -1;
                                    t.vx = dir * 45;
                                    t.vy = -8;
                                }
                                if (this.type === "fire_bolt") {
                                    t.buffs.burn = 3000;
                                    t.buffs.slow = 1000;
                                }
                                if (this.type === "water_bolt") {
                                    if (t.waterStunImmunity <= 0) {
                                        t.buffs.dizzy = 500;
                                        t.waterStunImmunity = 1000;
                                    }
                                }
                                if (this.type === "tidal_wave") {
                                    t.buffs.slow = 4500;
                                    t.buffs.dizzy = 1000;
                                    t.vx += (this.vx > 0 ? 1 : -1) * 15;
                                }
                            }

                            if (this.type === "bullet" && this.owner.heroName === 'Duke') {
                                this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 50);
                                for(let i=0; i<8; i++) game.particles.push(new Particle(this.owner.x + Math.random()*this.owner.w, this.owner.y + Math.random()*this.owner.h, "#32CD32", 0, -Math.random()*4, 500, 5));
                            }
                            for(let i=0; i<5; i++) game.particles.push(new Particle(this.x, this.y, this.color, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 300));
                        }

                        this.hitTargets.add(t);
                        if (this.type !== "blue_paper_plane" && this.type !== "tidal_wave") {
                            this.dead = true;
                            break;
                        }
                    }
                }
            }
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            if (this.type === "dynamite") {
                ctx.fillStyle = "#ff3333"; ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillStyle = "#ffff00"; ctx.fillRect(this.x + this.w/2, this.y - 5, 2, 5);
            } else if (this.type === "knife" || this.type === "large_knife" || this.type === "enhanced_knife") {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.vx > 0 ? this.timer*0.02 : -this.timer*0.02);
                if (this.type === "large_knife") { ctx.scale(2, 2); ctx.fillStyle = "#0ff"; }
                else if (this.type === "enhanced_knife") { ctx.scale(1.5, 1.5); ctx.fillStyle = "#ff5500"; }
                else ctx.fillStyle = "#ddd";
                ctx.beginPath(); ctx.moveTo(-10, -2); ctx.lineTo(10, 0); ctx.lineTo(-10, 2); ctx.fill();
                ctx.restore(); this.timer += 16;

                if (this.type === "enhanced_knife") game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, "#ff5500", 0, 0, 150, 4));
            } else if (this.type === "ki_blast") {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.fillStyle = "rgba(0, 191, 255, 0.8)";
                ctx.beginPath(); ctx.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.ellipse(0, 0, this.w/4, this.h/4, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, "#00bfff", 0, 0, 150, 6));
            } else if (this.type === "magic_burst") {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.timer * 0.05);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.rotate(Math.PI/4);
                ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
                game.particles.push(new Particle(this.x + this.w/2, this.y + this.h/2, this.color, 0, 0, 150, 4));
                this.timer += 16;
            } else if (this.type === "thrown_axe") {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.timer * 0.05 * (this.vx > 0 ? 1 : -1));
                ctx.fillStyle = "#8B4513"; ctx.fillRect(-3, -15, 6, 30);
                ctx.fillStyle = "#ccc";
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(15, -20); ctx.lineTo(20, 0); ctx.lineTo(0, 5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-15, -20); ctx.lineTo(-20, 0); ctx.lineTo(0, 5); ctx.fill();
                ctx.restore();
                this.timer += 16;
            } else if (this.type === "paper_plane" || this.type === "blue_paper_plane") {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2);
                let pAngle = Math.atan2(this.vy, this.vx);
                ctx.rotate(pAngle);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.w/2, 0);
                ctx.lineTo(-this.w/2, this.h/2);
                ctx.lineTo(-this.w/4, 0);
                ctx.lineTo(-this.w/2, -this.h/2);
                ctx.fill();
                ctx.restore();
                if (this.type === "blue_paper_plane" && Math.random() < 0.5) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#88ccff", 0, 0, 150, 3));
            } else if (this.type === "fire_bolt" || this.type === "water_bolt") {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x+this.w/2, this.y+this.h/2, this.w/2, 0, Math.PI*2); ctx.fill();
                game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, this.color, 0, 0, 100, 3));
            } else if (this.type === "volt_laser") {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00FFFF";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.shadowBlur = 0;
                game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#00FFFF", 0, 0, 100, 2));
            } else if (this.type === "tidal_wave") {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                game.particles.push(new Particle(this.x+Math.random()*this.w, this.y+Math.random()*this.h, "#fff", 0, -2, 100, 2));
            } else if (this.type === "bullet" || this.type === "homing_bullet") {
                ctx.fillStyle = this.type === "homing_bullet" ? "#ff5500" : "#fff";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            } else {
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
        }
    }

    class Minion extends Entity {

            if (this.y + this.h >= BOTTOM_Y) { this.y = BOTTOM_Y - this.h; this.vy = 0; }

                    }

            let enemy = game.getEnemyOf(this.owner);

            ctx.fillStyle = "#dcb274"; ctx.beginPath(); ctx.moveTo(this.x + this.w / 2, this.y - 12); ctx.lineTo(this.x - 12, this.y + 8); ctx.lineTo(this.x + this.w + 12, this.y + 8); ctx.fill();
            ctx.strokeStyle = "#b58b4c"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x - 12, this.y + 8); ctx.lineTo(this.x + this.w + 12, this.y + 8); ctx.stroke();
            ctx.fillStyle = "#4a2e15"; ctx.fillRect(this.x + (dir>0?10:-20), this.y + 25, 45, 5);
            ctx.fillStyle = "#222"; ctx.fillRect(this.x + (dir>0?25:-20), this.y + 23, 30, 3);
            ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 20, this.w, 4);

            this.vy += GRAVITY;
            this.y += this.vy;
            if (this.y + this.h >= BOTTOM_Y) { this.y = BOTTOM_Y - this.h; this.vy = 0; }

            if (this.vy >= 0) {
                for (let plat of PLATFORMS) {
                    if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y && this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                        this.y = plat.y - this.h; this.vy = 0;
                    }
                }
            }

            let enemy = game.getEnemyOf(this.owner);
            if (enemy && !enemy.dead) {
                let dx = enemy.x + enemy.w/2 - (this.x + this.w/2);
                let dy = enemy.y + enemy.h/2 - (this.y + this.h/2);
                let dist = Math.abs(dx);

                if (dist > 30) {
                    this.vx = (dx > 0 ? 1 : -1) * this.speed;
                    this.x += this.vx;
                }

                if (dy < -40 && this.vy === 0 && dist < 150) {
                    this.vy = -this.jumpPower;
                }

                if (this.attackCooldown > 0) this.attackCooldown -= dt;
                if (dist < 50 && Math.abs(dy) < 60 && this.attackCooldown <= 0) {
                    enemy.takeDamage(30, this.owner);
                    this.attackCooldown = 1000;
                    game.particles.push(new Particle(this.x + this.w/2, this.y, "#8A2BE2", dx>0?5:-5, 0, 200, 8));
                }
            }

            if (this.x < 0) this.x = 0;
            if (this.x > CANVAS_W - this.w) this.x = CANVAS_W - this.w;
        }
        draw(ctx) {
            if (this.buffs.dizzy > 0) {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y - 15);
                let timeAngle = Date.now() * 0.005;
                for(let s=0; s<3; s++) {
                    let offset = timeAngle + (s * (Math.PI*2/3));
                    ctx.fillStyle = "#FFD700"; ctx.fillRect(Math.cos(offset)*10, Math.sin(offset)*3, 3, 3);
                }
                ctx.restore();
            }

            ctx.fillStyle = this.color;
            ctx.fillRect(this.x + 5, this.y + 18, this.w - 10, this.h - 18);
            ctx.fillStyle = "#111";
            ctx.fillRect(this.x + 5, this.y + 25, this.w - 10, 4);
            ctx.fillRect(this.x + 5, this.y + 35, this.w - 10, 4);
            ctx.fillRect(this.x + 5, this.y + 45, this.w - 10, 4);

            ctx.fillStyle = "#fff";
            ctx.fillRect(this.x + 2, this.y, this.w - 4, 18);
            ctx.fillStyle = "#8A2BE2";
            let enemy = game.getEnemyOf(this.owner);
            let dir = (enemy && enemy.x > this.x) ? 1 : -1;
            ctx.fillRect(this.x + (dir>0?20:10), this.y + 4, 6, 6);

            ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 12, this.w, 4);
            ctx.fillStyle = "#8A2BE2"; ctx.fillRect(this.x, this.y - 12, this.w * (this.hp/this.maxHp), 4);
        }
    }

    class Puppet extends Entity {
        constructor(owner, x, y) {
            super(x, y, 35, 65);
            this.owner = owner;
            this.type = "puppet";
            this.hp = 250;
            this.maxHp = 250;
            this.color = "#aaaaaa";
            this.speed = 4.5;
            this.jumpPower = 15;
            this.attackCooldown = 0;
            this.buffs = { dizzy: 0 };
            this.invincible = 0;
            this.targetVx = 0;
            this.facing = owner.facing;
            this.attackState = 'idle';
            this.stateTimer = 0;
            this.hasHit = false;
            this.isGrounded = false;
        }
        takeDamage(amt, attacker) {
            if (this.grappledBy) return;
            this.hp -= amt;
            if (this.hp <= 0) {
                this.dead = true;
                for(let i=0; i<15; i++) game.particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, "#fff", (Math.random()-0.5)*10, Math.random()*-15, 500, 4));
                if (this.owner && !this.owner.dead) {
                    this.owner.buffs.dizzy = 3000;
                    this.owner.attackState = 'idle';
                }
            }
        }
        doJump() {
            if (this.isGrounded && this.attackState === 'idle') {
                this.vy = -this.jumpPower;
                this.isGrounded = false;
            }
        }
        doAttack() {
            if (this.attackState === 'idle') {
                this.attackState = 'windup';
                this.stateTimer = 100;
                this.hasHit = false;
            }
        }
        update(dt) {
            if (this.buffs.dizzy > 0) { this.buffs.dizzy -= dt; return; }

            this.vy += GRAVITY;

            if (this.attackState !== 'idle') this.targetVx = 0;
            this.vx += (this.targetVx - this.vx) * 0.25;

            this.x += this.vx;
            this.y += this.vy;

            if (this.y + this.h >= BOTTOM_Y) { this.y = BOTTOM_Y - this.h; this.vy = 0; this.isGrounded = true; }
            else this.isGrounded = false;

            if (this.vy > 0) {
                for (let plat of PLATFORMS) {
                    if (this.y + this.h - this.vy <= plat.y && this.y + this.h >= plat.y && this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                        this.y = plat.y - this.h; this.vy = 0; this.isGrounded = true;
                    }
                }
            }

            if (this.x < 0) this.x = 0;
            if (this.x > CANVAS_W - this.w) this.x = CANVAS_W - this.w;

            if (this.attackState === 'windup') {
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    this.attackState = 'active';
                    this.stateTimer = 100;

                    let px = this.facing === 1 ? this.x + this.w : this.x - 40;
                    let hitBox = { x: px, y: this.y + 10, w: 40, h: 40 };
                    let enemy = game.getEnemyOf(this.owner);
                    let targetsHit = [];
                    if (!enemy.dead && checkAABB(hitBox, enemy)) targetsHit.push(enemy);
                    for (let m of game.minions) {
                        if (m.owner !== this.owner && !m.dead && checkAABB(hitBox, m)) targetsHit.push(m);
                    }
                    for (let n of game.npcs) {
                        if (!n.dead && checkAABB(hitBox, n)) targetsHit.push(n);
                    }

                    if (targetsHit.length > 0) {
                        this.hasHit = true;
                        targetsHit.forEach(t => t.takeDamage(20, this.owner));
                    }
                }
            } else if (this.attackState === 'active') {
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    this.attackState = 'recovery';
                    this.stateTimer = 150;
                }
            } else if (this.attackState === 'recovery') {
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) this.attackState = 'idle';
            }
        }
        draw(ctx) {
            if (this.buffs.dizzy > 0) {
                ctx.save(); ctx.translate(this.x + this.w/2, this.y - 15);
                let timeAngle = Date.now() * 0.005;
                for(let s=0; s<3; s++) {
                    let offset = timeAngle + (s * (Math.PI*2/3));
                    ctx.fillStyle = "#FFD700"; ctx.fillRect(Math.cos(offset)*10, Math.sin(offset)*3, 3, 3);
                }
                ctx.restore();
            }

            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            if (this.facing === -1) ctx.scale(-1, 1);

            ctx.fillStyle = this.color;
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);

            ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-this.w/2, -this.h/2 + 20); ctx.lineTo(this.w/2, -this.h/2 + 20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-this.w/2, -this.h/2 + 40); ctx.lineTo(this.w/2, -this.h/2 + 40); ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(10, -this.h/2 + 10, 4, 0, Math.PI*2); ctx.fill();

            if (this.attackState !== 'idle') {
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                let ext = this.attackState === 'active' ? 30 : (this.attackState === 'windup' ? 0 : 10);
                ctx.fillRect(this.w/2, -10, ext, 10);
            }

            ctx.restore();

            ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 12, this.w, 4);
            ctx.fillStyle = "#fff"; ctx.fillRect(this.x, this.y - 12, this.w * (this.hp/this.maxHp), 4);
        }
    }

    class Hurricane extends Entity {
        constructor(owner, x, y) {
            super(x, y, 100, 300);
            this.owner = owner; this.timer = 15000; this.tickTimer = 0; this.stunTickTimer = 0;
        }
        update(dt) {
            this.timer -= dt; if (this.timer <= 0) this.dead = true;
            this.tickTimer += dt;
            if (this.tickTimer >= 200) {
                this.tickTimer = 0;
                let enemy = game.getEnemyOf(this.owner);
                if (checkAABB(this, enemy)) enemy.takeDamage(0.6, this.owner, true);
                for (let m of game.minions) {
                    if (m.owner !== this.owner && !m.dead && checkAABB(this, m)) m.takeDamage(0.6, this.owner, true);
                }
            }
            this.stunTickTimer += dt;
            if (this.stunTickTimer >= 1000) {
                this.stunTickTimer = 0;
                let targets = [game.getEnemyOf(this.owner), ...game.minions.filter(m => m.owner !== this.owner)];
                for (let t of targets) {
                    if (!t.dead && checkAABB(this, t)) { t.buffs = t.buffs || {}; t.buffs.dizzy = 500; }
                }
            }
            if(Math.random() < 0.3) game.particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, "#aaddff", (Math.random()-0.5)*4, -Math.random()*5, 400));
        }
        draw(ctx) {
            ctx.globalAlpha = 0.5; ctx.fillStyle = "#88ccff";
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.w, this.y); ctx.lineTo(this.x + this.w/2 + 20, this.y + this.h); ctx.lineTo(this.x + this.w/2 - 20, this.y + this.h); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }
    const game = new Game();

    window.addEventListener('resize', () => {
        CANVAS_W = window.innerWidth; CANVAS_H = window.innerHeight;
        game.canvas.width = CANVAS_W; game.canvas.height = CANVAS_H;
        updatePlatforms();
    });
    window.dispatchEvent(new Event('resize'));
</script>
